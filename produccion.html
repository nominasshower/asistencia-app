<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calidad Producción — Shower Walls</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;
  --border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;
  --accent:#22c55e;--accent2:#3b82f6;--warn:#f59e0b;--danger:#ef4444;
  --ga:#22c55e;--gb:#f59e0b;--gc:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
.logo{padding:20px 20px 12px;font-size:13px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;}
.logo svg{width:18px;height:18px;}
.logo-sub{font-size:10px;color:var(--muted);font-weight:400;margin-top:1px;}
.nav-group{padding:0 8px;margin-bottom:4px;}
.nav-label{font-size:10px;color:var(--muted);padding:8px 12px 4px;letter-spacing:.8px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;border:1px solid transparent;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:rgba(34,197,94,.1);color:var(--accent);border-color:rgba(34,197,94,.2);}
.nav-item svg{width:15px;height:15px;flex-shrink:0;}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center;}
.main{margin-left:220px;min-height:100vh;}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:50;}
.topbar-title{font-size:15px;font-weight:600;}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.content{padding:20px 24px;}
input[type=date]{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer;}
input[type=date]:focus{border-color:var(--accent2);}
.btn{font-size:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn:hover{background:var(--bg);border-color:rgba(255,255,255,.15);}
.btn-green{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.btn-green:hover{background:#16a34a;}
.btn-wa{background:#25d366;color:#000;border-color:#25d366;font-weight:600;}
.btn-wa:hover{background:#1da851;}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.metric-label{font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.metric-val{font-size:26px;font-weight:600;line-height:1;}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.green{color:var(--ga);}.amber{color:var(--gb);}.red{color:var(--gc);}.blue{color:var(--accent2);}.white{color:var(--text);}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.card-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.card-title span{color:var(--muted);font-size:11px;font-weight:400;}
.bar-chart{display:flex;flex-direction:column;gap:7px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{width:170px;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex-shrink:0;font-size:11px;}
.bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.bar-val{width:36px;text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.grade-bars{display:flex;flex-direction:column;gap:10px;}
.grade-row{display:flex;align-items:center;gap:10px;}
.grade-letter{font-size:13px;font-weight:700;width:18px;flex-shrink:0;}
.grade-track{flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;}
.grade-fill{height:100%;border-radius:5px;transition:width .6s ease;}
.grade-count{font-family:'DM Mono',monospace;font-size:12px;width:50px;text-align:right;}
.grade-pct{font-size:11px;color:var(--muted);width:36px;text-align:right;}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.table-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.table-header-title{font-size:13px;font-weight:600;}
table{width:100%;border-collapse:collapse;}
th{padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.mono{font-family:'DM Mono',monospace;font-size:11px;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap;}
.b-a{background:rgba(34,197,94,.15);color:#4ade80;}
.b-b{background:rgba(245,158,11,.15);color:#fbbf24;}
.b-c{background:rgba(239,68,68,.15);color:#f87171;}
.b-sin{background:var(--bg3);color:var(--muted);}
.dtag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin:1px;border:1px solid;}
.dtag-g{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.2);}
.dtag-m{background:rgba(245,158,11,.12);color:#fbbf24;border-color:rgba(245,158,11,.2);}
.dtag-o{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.2);}
.alert-card{border-radius:10px;border:1px solid;padding:14px 16px;margin-bottom:8px;}
.alert-card-crit{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.25);}
.alert-card-warn{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.25);}
.alert-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
.alert-card-tag{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;}
.alert-card-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.alert-card-count{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;flex-shrink:0;}
.alert-card-defects{display:flex;flex-wrap:wrap;gap:4px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--muted);}
.spinner{width:24px;height:24px;border:2px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{color:var(--muted);font-size:12px;text-align:center;padding:30px;}
.threshold-note{font-size:11px;color:var(--muted);padding:6px 0 12px;}

/* ── Modal filtros ──────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:520px;max-height:80vh;display:flex;flex-direction:column;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:14px;font-weight:600;}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1;}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.defect-check{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);}
.defect-check:last-child{border-bottom:none;}
.defect-check input{width:16px;height:16px;accent-color:var(--danger);cursor:pointer;flex-shrink:0;}
.defect-check label{font-size:12px;cursor:pointer;flex:1;}
.defect-check .dcount{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.section-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px;}
</style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────── -->
<div class="sidebar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <div>Shower Walls<div class="logo-sub">Calidad Producción</div></div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Producción</div>
    <div class="nav-item active" id="nav-dash" onclick="navegar('dash',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </div>
    <div class="nav-item" id="nav-alertas" onclick="navegar('alertas',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Alertas
    </div>
    <div class="nav-item" id="nav-tabla" onclick="navegar('tabla',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Registros
    </div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Config</div>
    <div class="nav-item" onclick="abrirFiltros()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/></svg>
      Filtros / Exclusiones
    </div>
    <div class="nav-item" onclick="window.open('index.html','_self')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Asistencia
    </div>
  </div>
  <div class="sidebar-bottom">Primera Inspección</div>
</div>

<!-- ── Main ────────────────────────────────────────────── -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Dashboard Calidad</div>
      <div class="topbar-sub" id="topbar-sub">Cargando…</div>
    </div>
    <div class="topbar-right">
      <label style="font-size:11px;color:var(--muted)">Desde</label>
      <input type="date" id="fDesde">
      <label style="font-size:11px;color:var(--muted)">Hasta</label>
      <input type="date" id="fHasta">
      <button class="btn btn-green" onclick="cargar()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Actualizar
      </button>
      <button class="btn btn-wa" id="btn-wa" onclick="enviarWA()" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/></svg>
        WhatsApp
      </button>
    </div>
  </div>
  <div class="content" id="main-content">
    <div class="loading"><div class="spinner"></div><div>Cargando datos…</div></div>
  </div>
</div>

<!-- ── Modal filtros ────────────────────────────────────── -->
<div class="modal-overlay" id="modal-filtros" style="display:none" onclick="if(event.target===this)cerrarFiltros()">
  <div class="modal">
    <div class="modal-head">
      <h3>Catálogo de exclusiones</h3>
      <button class="btn" onclick="cerrarFiltros()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">
        Los defectos marcados <strong style="color:var(--danger)">se excluyen</strong> de alertas y conteos. Se guardan en este navegador.
      </div>
      <div id="lista-defectos"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="cerrarFiltros()">Cancelar</button>
      <button class="btn btn-green" onclick="guardarFiltros()">Guardar exclusiones</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────
const API_KEY   = "AIzaSyD2fUvrz6Mtl9eHP4tnVwEth76dBgeWIC0";
const SHEET_ID  = "1N8cyjOwqXj2AZIl_sGLagyH-djM1pJTx7KRCv8VKt7c";
const WA_NUM    = "528115014189";
const LS_KEY    = "sw_excluir_defectos";

// Umbrales de alerta
const UMBRAL_MOLDE   = 2;   // mismo TAG, mismas defectos de molde en el día
const UMBRAL_GELCOAT = 10;  // misma Línea, defectos de gelcoat en el día

// Defectos pre-excluidos por defecto (falsos positivos conocidos)
const EXCLUIR_DEFAULT = [
  "PIEZA DESMOLDADA",
  "Molde Vacio",
  "Generación Incorrecta",
  "Pieza para Redimención",
];

// Clasificación
const GELCOAT_KEYS = ["rechazo de gelcoat","gelcoat delgado","gelcoat levantado","gelcoat estrellado","gelcoat reventado","gelcoat poroso","gelcoat tierno","gelcoat contaminado","gelcoat"];
const MOLDE_KEYS   = ["marca de molde","fallo de máquina","despostillado en desmolde","quebrado en desmolde","rayas por manejo","grumos"];

let INSP   = [];   // registros inspección filtrados por fecha
let VACIADO = {};  // map TAG → última fecha de vaciado
let VISTA  = "dash";
let ALL_DEFECTS = {}; // defecto → conteo total (para el modal)

// ── Exclusiones (localStorage) ──────────────────────────
function getExcluidos() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || "null");
    return saved || [...EXCLUIR_DEFAULT];
  } catch { return [...EXCLUIR_DEFAULT]; }
}
function setExcluidos(arr) {
  localStorage.setItem(LS_KEY, JSON.stringify(arr));
}
let EXCLUIDOS = getExcluidos();

function estaExcluido(defecto) {
  const d = defecto.trim().toLowerCase();
  return EXCLUIDOS.some(e => e.toLowerCase() === d);
}

function defectosActivos(detalle) {
  if (!detalle || detalle === "null") return [];
  return detalle.split(",").map(d => d.trim()).filter(d => d && !estaExcluido(d));
}

// ── Clasificación ────────────────────────────────────────
function clasif(d) {
  const s = d.toLowerCase();
  if (GELCOAT_KEYS.some(k => s.includes(k))) return "g";
  if (MOLDE_KEYS.some(k => s.includes(k))) return "m";
  return "o";
}

// ── Fetch sheet ──────────────────────────────────────────
async function fetchSheet(name) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(name)}?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} (${name})`);
  const j = await r.json();
  const [hdrs, ...rows] = j.values || [];
  if (!hdrs) return [];
  return rows.map(r => { const o={}; hdrs.forEach((h,i)=>o[h]=r[i]??""); return o; });
}

// ── Cargar datos ─────────────────────────────────────────
async function cargar() {
  const desde = document.getElementById("fDesde").value;
  const hasta = document.getElementById("fHasta").value;
  document.getElementById("main-content").innerHTML =
    `<div class="loading"><div class="spinner"></div><div>Cargando datos…</div></div>`;
  document.getElementById("btn-wa").style.display = "none";

  try {
    const [inspRaw, vacRaw] = await Promise.all([
      fetchSheet("INSPECCION"),
      fetchSheet("VACIADO")
    ]);

    // Vaciado: último vaciado por TAG
    VACIADO = {};
    vacRaw.forEach(r => {
      const tag = r["TAG"] || r["Tag"] || "";
      const fecha = r["Fecha"] || "";
      if (!tag) return;
      if (!VACIADO[tag] || fecha > VACIADO[tag]) VACIADO[tag] = fecha;
    });

    // Inspección: filtrar por fecha
    const d0 = desde ? new Date(desde + "T00:00:00") : null;
    const d1 = hasta ? new Date(hasta + "T23:59:59") : null;
    INSP = inspRaw.filter(r => {
      const dt = new Date(r["Fecha"]);
      if (d0 && dt < d0) return false;
      if (d1 && dt > d1) return false;
      return true;
    });

    // Conteo global de defectos para el modal
    ALL_DEFECTS = {};
    inspRaw.forEach(r => {
      (r["Detalle Defecto"]||"").split(",").forEach(d => {
        d = d.trim();
        if (d && d !== "null") ALL_DEFECTS[d] = (ALL_DEFECTS[d]||0) + 1;
      });
    });

    document.getElementById("topbar-sub").textContent =
      `${INSP.length} piezas — ${desde} → ${hasta}`;

    document.getElementById("btn-wa").style.display = "flex";
    renderVista(INSP);
  } catch(e) {
    document.getElementById("main-content").innerHTML =
      `<div class="loading" style="color:var(--danger)">
        Error al cargar datos.<br>
        <span style="font-size:10px;color:var(--muted);margin-top:4px;display:block">${e.message}</span>
      </div>`;
  }
}

// ── Nav ──────────────────────────────────────────────────
function navegar(id, el) {
  VISTA = id;
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  el.classList.add("active");
  renderVista(INSP);
}

function renderVista(data) {
  if (VISTA === "dash")    renderDash(data);
  else if (VISTA === "alertas") renderAlertas(data);
  else if (VISTA === "tabla")   renderTabla(data);
}

// ── Helpers visuales ─────────────────────────────────────
function fmt(d) {
  if (!d) return "—";
  const dt = new Date(d);
  return dt.toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit"})
    + " " + dt.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
}

function fmtHora(d) {
  if (!d) return "—";
  return new Date(d).toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
}

function tagCorto(tag) {
  const t = (tag||"").toUpperCase();
  // TAGs tienen formato AABB0000[6-único]0000... — mostrar la parte única (pos 8-14)
  return t.length >= 14 ? t.slice(8, 14) : t.slice(0, 8);
}

function renderDtags(lista) {
  return lista.map(d => {
    const c = clasif(d);
    const cls = c==="g"?"dtag dtag-g":c==="m"?"dtag dtag-m":"dtag dtag-o";
    return `<span class="${cls}">${d}</span>`;
  }).join("");
}

// ── Calcular alertas ─────────────────────────────────────
function calcAlertas(data) {
  // ── Alertas molde: por TAG, ≥ UMBRAL_MOLDE defectos de molde hoy ──
  const porTag = {};
  data.forEach(r => {
    const tag = r["TAG"] || "";
    if (!tag) return;
    const activos = defectosActivos(r["Detalle Defecto"]);
    const dMolde  = activos.filter(d => clasif(d) === "m");
    if (dMolde.length === 0) return;
    if (!porTag[tag]) porTag[tag] = { tag, patron: r["Patron"]||"", defectos: {}, linea: r["Linea"]||"" };
    dMolde.forEach(d => porTag[tag].defectos[d] = (porTag[tag].defectos[d]||0)+1);
  });
  const alertasMolde = Object.values(porTag)
    .map(g => ({ ...g, total: Object.values(g.defectos).reduce((a,b)=>a+b,0) }))
    .filter(g => g.total >= UMBRAL_MOLDE)
    .sort((a,b) => b.total - a.total);

  // ── Alertas gelcoat: por Línea, ≥ UMBRAL_GELCOAT defectos gelcoat hoy ──
  const porLinea = {};
  data.forEach(r => {
    const linea = r["Linea"] || "—";
    const activos = defectosActivos(r["Detalle Defecto"]);
    const dGel = activos.filter(d => clasif(d) === "g");
    if (dGel.length === 0) return;
    if (!porLinea[linea]) porLinea[linea] = { linea, defectos: {}, tags: new Set() };
    dGel.forEach(d => porLinea[linea].defectos[d] = (porLinea[linea].defectos[d]||0)+1);
    if (r["TAG"]) porLinea[linea].tags.add(r["TAG"]);
  });
  const alertasGelcoat = Object.values(porLinea)
    .map(g => ({ ...g, total: Object.values(g.defectos).reduce((a,b)=>a+b,0), tags: [...g.tags] }))
    .filter(g => g.total >= UMBRAL_GELCOAT)
    .sort((a,b) => b.total - a.total);

  return { alertasMolde, alertasGelcoat };
}

// ── Alertas ──────────────────────────────────────────────
function renderAlertas(data) {
  document.getElementById("topbar-title").textContent = "Alertas de calidad";
  const { alertasMolde, alertasGelcoat } = calcAlertas(data);
  const desde = document.getElementById("fDesde").value;
  const hasta = document.getElementById("fHasta").value;

  document.getElementById("main-content").innerHTML = `
  <div class="threshold-note">
    Molde: alerta cuando el mismo TAG acumula <strong>≥ ${UMBRAL_MOLDE} defectos de molde</strong> en el período. &nbsp;|&nbsp;
    Gelcoat: alerta cuando una línea acumula <strong>≥ ${UMBRAL_GELCOAT} defectos de gelcoat</strong> en el período.
    &nbsp;<span style="color:var(--muted)">Período: ${desde} → ${hasta}</span>
  </div>

  <div style="margin-bottom:16px">
    <div style="font-size:13px;font-weight:600;color:var(--warn);margin-bottom:8px">
      ⚙️ Moldes con fallas — ${alertasMolde.length} TAG${alertasMolde.length!==1?"s":""}
    </div>
    ${alertasMolde.length===0
      ? `<div class="empty" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px">Sin moldes con fallas en el período (umbral: ${UMBRAL_MOLDE} defectos)</div>`
      : alertasMolde.map(a => {
          const ultimo = VACIADO[a.tag] ? fmt(VACIADO[a.tag]) : "—";
          const defList = Object.entries(a.defectos).sort((x,y)=>y[1]-x[1]);
          return `
          <div class="alert-card alert-card-warn">
            <div class="alert-card-head">
              <div>
                <div class="alert-card-tag" style="color:var(--warn)">${tagCorto(a.tag)}</div>
                <div class="alert-card-meta">${a.patron || "—"} · Línea ${a.linea||"—"} · Último vaciado: ${ultimo}</div>
                <div class="alert-card-meta mono" style="font-size:10px;margin-top:2px;color:var(--bg3)">${a.tag}</div>
              </div>
              <div class="alert-card-count" style="color:var(--warn)">${a.total}</div>
            </div>
            <div class="alert-card-defects">
              ${defList.map(([d,c])=>`<span class="dtag dtag-m">${d} (${c})</span>`).join("")}
            </div>
          </div>`;
        }).join("")}
  </div>

  <div>
    <div style="font-size:13px;font-weight:600;color:var(--danger);margin-bottom:8px">
      🎨 Gelcoat por línea — ${alertasGelcoat.length} línea${alertasGelcoat.length!==1?"s":""}
    </div>
    ${alertasGelcoat.length===0
      ? `<div class="empty" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px">Sin alertas de gelcoat (umbral: ${UMBRAL_GELCOAT} defectos por línea)</div>`
      : alertasGelcoat.map(a => {
          const defList = Object.entries(a.defectos).sort((x,y)=>y[1]-x[1]);
          return `
          <div class="alert-card alert-card-crit">
            <div class="alert-card-head">
              <div>
                <div class="alert-card-tag" style="color:var(--danger)">Línea ${a.linea}</div>
                <div class="alert-card-meta">${a.tags.length} molde${a.tags.length!==1?"s":""}  afectado${a.tags.length!==1?"s":""}</div>
              </div>
              <div class="alert-card-count" style="color:var(--danger)">${a.total}</div>
            </div>
            <div class="alert-card-defects">
              ${defList.map(([d,c])=>`<span class="dtag dtag-g">${d} (${c})</span>`).join("")}
            </div>
            <div style="margin-top:8px;font-size:10px;color:var(--muted)">TAGs: ${a.tags.map(t=>tagCorto(t)).join(" · ")}</div>

// ── WhatsApp ─────────────────────────────────────────────
function enviarWA() {
  const { alertasMolde, alertasGelcoat } = calcAlertas(INSP);
  const desde = document.getElementById("fDesde").value;
  const hasta  = document.getElementById("fHasta").value;
  const fecha  = desde === hasta ? desde : `${desde} → ${hasta}`;

  let msg = `🔴 *Alertas Calidad Shower Walls*\n📅 ${fecha}\n`;

  if (alertasMolde.length === 0 && alertasGelcoat.length === 0) {
    msg += `\n✅ Sin alertas en el período.`;
  }

  if (alertasMolde.length > 0) {
    msg += `\n⚙️ *Moldes con fallas (≥${UMBRAL_MOLDE} defectos)*\n`;
    alertasMolde.forEach(a => {
      const ultimo = VACIADO[a.tag] ? fmtHora(VACIADO[a.tag]) : "—";
      const defs   = Object.entries(a.defectos).sort((x,y)=>y[1]-x[1])
                       .map(([d,c])=>`${d}(${c})`).join(", ");
      msg += `• TAG: ${tagCorto(a.tag)} | ${a.patron||"—"} | Últ. vaciado: ${ultimo}\n  Defectos: ${defs}\n`;
    });
  }

  if (alertasGelcoat.length > 0) {
    msg += `\n🎨 *Gelcoat por línea (≥${UMBRAL_GELCOAT} defectos)*\n`;
    alertasGelcoat.forEach(a => {
      const defs = Object.entries(a.defectos).sort((x,y)=>y[1]-x[1])
                     .map(([d,c])=>`${d}(${c})`).join(", ");
      msg += `• Línea ${a.linea}: ${a.total} defectos | ${defs}\n`;
    });
  }

  window.open(`https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`, "_blank");
}

// ── Modal filtros ─────────────────────────────────────────
function abrirFiltros() {
  const lista = document.getElementById("lista-defectos");

  // Separar en categorías
  const gelcoatDef = [], moldeDef = [], otrosDef = [];
  Object.entries(ALL_DEFECTS).sort((a,b)=>b[1]-a[1]).forEach(([d,c]) => {
    const cl = clasif(d);
    if (cl==="g") gelcoatDef.push([d,c]);
    else if (cl==="m") moldeDef.push([d,c]);
    else otrosDef.push([d,c]);
  });

  const seccion = (titulo, items) => {
    if (items.length===0) return "";
    return `<div class="section-label">${titulo}</div>` +
      items.map(([d,c]) => {
        const chk = estaExcluido(d) ? "checked" : "";
        const id  = "chk_" + btoa(encodeURIComponent(d)).slice(0,12);
        return `<div class="defect-check">
          <input type="checkbox" id="${id}" value="${d}" ${chk}>
          <label for="${id}">${d}</label>
          <span class="dcount">${c}</span>
        </div>`;
      }).join("");
  };

  lista.innerHTML = seccion("Gelcoat", gelcoatDef)
    + seccion("Molde / Desmolde", moldeDef)
    + seccion("Otros", otrosDef);

  document.getElementById("modal-filtros").style.display = "flex";
}

function cerrarFiltros() {
  document.getElementById("modal-filtros").style.display = "none";
}

function guardarFiltros() {
  const checks = document.querySelectorAll("#lista-defectos input[type=checkbox]");
  EXCLUIDOS = [...checks].filter(c=>c.checked).map(c=>c.value);
  setExcluidos(EXCLUIDOS);
  cerrarFiltros();
  renderVista(INSP);
}

// ── Init ─────────────────────────────────────────────────
(function init() {
  const h = new Date().toISOString().slice(0,10);
  document.getElementById("fDesde").value = h;
  document.getElementById("fHasta").value = h;
  document.getElementById("fDesde").addEventListener("change", cargar);
  document.getElementById("fHasta").addEventListener("change", cargar);
  cargar();
})();
</script>
