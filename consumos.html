<style>

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}

table{width:100%;border-collapse:collapse;}

tr:last-child td{border-bottom:none;}

.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:750px;max-height:88vh;display:flex;flex-direction:column;}

<script>
const API_KEY       = "AIzaSyD2fUvrz6Mtl9eHP4tnVwEth76dBgeWIC0";
const SHEET_ID      = "1N8cyjOwqXj2AZIl_sGLagyH-djM1pJTx7KRCv8VKt7c";
const KPIS_SHEET_ID = "1tr8iCcA9SL2U4i-a1U7LC_Fd5EnQe1krAyPMA599D-o";
const GAS_INV_URL   = "https://script.google.com/macros/s/AKfycbxk5nKkN1Dq0HGz99OU2VqXYqD7UOOa4qG_XvySvgmlSeOucTQhKUbyE1tpwROJmjIR/exec";

let VISTA="resumen", LINEA="";
let TEORICO_RAW=[], FAB_RAW=[], ALM_RAW=[], COMP_RAW=[], INVENTARIOS_RAW=[];
let KPIS_L1=[], KPIS_L2=[], PRECIOS_RAW=[];

const MATERIALES = [
  {key:"gelcoat",   label:"Gel Coat",        col_teo:"Gelcoat",      color:"#3b82f6"},
  {key:"butanox",   label:"Butanox M-50",     col_teo:"Butanox M-50", color:"#8b5cf6"},
  {key:"resina",    label:"Resina PMS 7103",  col_teo:"Resina",       color:"#f59e0b"},
  {key:"norox",     label:"Norox 900",         col_teo:"Norox",        color:"#06b6d4"},
  {key:"marmolina", label:"Marmolina Estens", col_teo:"Marmolina",    color:"#22c55e"},
];

const LABEL_MAT = {
  "Gel Coat (todos colores)":"gelcoat",
  "Catalizador Butanox M-50":"butanox",
  "Resina PMS 7103 Invierno":"resina",
  "Catalizador Norox 900":   "norox",
  "Marmolina Estens":        "marmolina",
};

// Columnas de KPIS (índice base 0 en el array de valores)
// Col A=ID, B=FECHA, C=Resina, D=Marmolina, E=Catalizador, F=Gelcoat, L=Kilos merma
const KPIS_COLS = {fecha:1, resina:2, marmolina:3, catalizador:4, gelcoat:5, merma:11};

// ── Sheets ───────────────────────────────────────────────
async function fetchSheet(sheetId, name) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(name)}?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${name}`);
  const j = await r.json();
  const [hdrs,...rows] = j.values||[];
  if (!hdrs) return [];
  return rows.map(r=>{const o={};hdrs.forEach((h,i)=>o[h]=r[i]??"");return o;});
}

async function fetchSheetRaw(sheetId, name) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(name)}?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) return [];
  const j = await r.json();
  return j.values || [];
}

// ── Fechas ───────────────────────────────────────────────
function getFechas(){return{desde:document.getElementById("fDesde")?.value||"",hasta:document.getElementById("fHasta")?.value||""};}

function parseDate(s){
  if(!s) return null;
  // Soporta YYYY-MM-DD y DD/MM/YYYY
  const m1=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m1) return new Date(+m1[1],+m1[2]-1,+m1[3]);
  const m2=String(s).match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if(m2) return new Date(+m2[3],+m2[2]-1,+m2[1]);
  return null;
}

function enPeriodo(s){
  const d=parseDate(s); if(!d) return false;
  const{desde,hasta}=getFechas();
  if(desde){const[y,mo,dd]=desde.split("-").map(Number);if(d<new Date(y,mo-1,dd))return false;}
  if(hasta){const[y,mo,dd]=hasta.split("-").map(Number);if(d>new Date(y,mo-1,dd,23,59,59))return false;}
  return true;
}

function fmtN(n){return Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1});}
function fmtP(n){const v=Number(n||0);return(v>=0?"+":"")+v.toFixed(1)+"%";}
function clrP(pct){const v=Number(pct);if(Math.abs(v)<=5)return"var(--ga)";if(v>5)return"var(--gb)";return"var(--gc)";}
function badge(pct){const v=Number(pct);if(Math.abs(v)<=5)return`<span class="badge b-ok">✓ OK</span>`;if(v>5)return`<span class="badge b-warn">⚠ Exceso</span>`;return`<span class="badge b-danger">⚡ Faltante</span>`;}

// ── Calcular teórico ──────────────────────────────────────
function calcTeorico(rows){
  const tot={};MATERIALES.forEach(m=>tot[m.key]=0);let paredes=0;
  rows.forEach(r=>{
    if(!enPeriodo(r["Fecha"]))return;
    if((r["Fecha"]||"").toUpperCase().includes("TOTAL"))return;
    if(LINEA&&String(r["Linea"]||"").trim()!==LINEA)return;
    paredes++;
    MATERIALES.forEach(m=>{tot[m.key]+=parseFloat((r[m.col_teo]||"").replace(",","."))||0;});
  });
  return{tot,paredes};
}

// ── Calcular físico desde KPIS ────────────────────────────
function calcFisico(rawRows){
  const tot={gelcoat:0,resina:0,marmolina:0,catalizador:0,merma:0};
  for(let i=1;i<rawRows.length;i++){
    const fila=rawRows[i];
    const fs=String(fila[KPIS_COLS.fecha]||"");
    let fd;
    if(fs.includes("/")){const p=fs.split("/");fd=new Date(+p[2],+p[1]-1,+p[0]);}
    else{const m=fs.match(/(\d{4})-(\d{2})-(\d{2})/);if(!m)continue;fd=new Date(+m[1],+m[2]-1,+m[3]);}
    const desde=document.getElementById("fDesde")?.value,hasta=document.getElementById("fHasta")?.value;
    if(desde){const[y,mo,dd]=desde.split("-").map(Number);if(fd<new Date(y,mo-1,dd))continue;}
    if(hasta){const[y,mo,dd]=hasta.split("-").map(Number);if(fd>new Date(y,mo-1,dd,23,59,59))continue;}
    for(const[mat,col] of Object.entries(KPIS_COLS)){
      if(mat==="fecha"||col>=fila.length)continue;
      tot[mat]+=parseFloat(String(fila[col]||"0").replace(/,/g,""))||0;
    }
  }
  const mezcla=tot.resina+tot.marmolina;
  const pctRes=mezcla?tot.resina/mezcla:0.18, pctMar=mezcla?tot.marmolina/mezcla:0.82;
  return{
    gelcoat:tot.gelcoat, resina:tot.resina, marmolina:tot.marmolina,
    butanox:tot.catalizador/2, norox:tot.catalizador/2, catalizador:tot.catalizador,
    merma:tot.merma,
    merma_resina:round2(tot.merma*pctRes), merma_marmolina:round2(tot.merma*pctMar),
    pct_merma_resina:mezcla?round2(tot.merma*pctRes/tot.resina*100):0,
    pct_merma_marmolina:mezcla?round2(tot.merma*pctMar/tot.marmolina*100):0,
    pct_merma_total:(tot.resina+tot.marmolina+tot.catalizador)?round2(tot.merma/(tot.resina+tot.marmolina+tot.catalizador)*100):0,
  };
}

function getFisicoLinea(){
  if(LINEA==="1") return calcFisico(KPIS_L1);
  if(LINEA==="2") return calcFisico(KPIS_L2);
  const f1=calcFisico(KPIS_L1), f2=calcFisico(KPIS_L2);
  const tot={};
  MATERIALES.forEach(m=>tot[m.key]=round2((f1[m.key]||0)+(f2[m.key]||0)));
  return{...tot, merma:round2(f1.merma+f2.merma),
    merma_resina:round2(f1.merma_resina+f2.merma_resina),
    merma_marmolina:round2(f1.merma_marmolina+f2.merma_marmolina),
    pct_merma_resina:f1.pct_merma_resina, pct_merma_marmolina:f1.pct_merma_marmolina,
    pct_merma_total:round2((f1.pct_merma_total+f2.pct_merma_total)/2)};
}

function round2(n){return Math.round(n*100)/100;}

// ── Calcular movimientos Odoo ─────────────────────────────
function calcMovimientos(rows, sinFiltroLinea=false){
  const tot={};MATERIALES.forEach(m=>tot[m.key]=0);const movs=[];
  rows.forEach(r=>{
    if(!enPeriodo(r["Fecha"]))return;
    if(!sinFiltroLinea&&LINEA&&String(r["Linea"]||"").trim()!==LINEA)return;
    const mat=LABEL_MAT[r["Material"]]||r["Material"];
    const qty=parseFloat((r["Cantidad (kg)"]||"").replace(",","."))||0;
    if(tot[mat]!==undefined)tot[mat]+=qty;
    movs.push({...r,_mat:mat,_qty:qty});
  });
  return{tot,movs};
}

// ── Render ───────────────────────────────────────────────
function render(){
  document.getElementById("main-content").innerHTML="";
  if(VISTA==="costos"){renderCostos();return;}
  const{tot:teo,paredes}=calcTeorico(TEORICO_RAW);
  const{tot:fab,movs:movsFab}=calcMovimientos(FAB_RAW);
  const{tot:alm,movs:movsAlm}=calcMovimientos(ALM_RAW,true); // almacén sin filtro línea
  const fis=getFisicoLinea();

  const{desde,hasta}=getFechas();
  const linLbl=LINEA?` · Línea ${LINEA}`:"";
  document.getElementById("topbar-sub").textContent=`${desde} → ${hasta}${linLbl} · ${paredes.toLocaleString()} paredes`;

  if(VISTA==="resumen") renderResumen(teo,fab,alm,fis,paredes);
  else if(VISTA==="fabricacion") renderMovimientos(movsFab,fab,teo,"Salidas hacia Fabricación");
  else if(VISTA==="fisico_vs_salidas") renderFisicoVsSalidas(fis,fab,paredes);
  else if(VISTA==="corte") renderCorte();
  else renderMovimientos(movsAlm,alm,teo,"Llegadas al Almacén",true);
}

// ── Movimientos ──────────────────────────────────────────

    ${MATERIALES.map(m=>{const t=teo[m.key],v=tot[m.key],p=t?((v-t)/t*100):0;return`<div class="metric">
      <div class="metric-label">${m.label}</div>
      <div class="metric-val" style="color:${m.color}">${fmtN(v)}<span style="font-size:11px"> kg</span></div>
      <div class="metric-sub" style="color:${clrP(p)}">${fmtP(p)} vs teórico</div>

  </div>
  <div class="table-wrap">
    <div class="table-header">

// ── Modal detalle ─────────────────────────────────────────

  const{tot:teo}=calcTeorico(TEORICO_RAW);

// Consumo real desde KPIS para un rango de fechas específico
function calcFisicoRango(inicio, fin) {
  const rows = LINEA==="1" ? KPIS_L1 : LINEA==="2" ? KPIS_L2 : [...KPIS_L1, ...KPIS_L2];
  const tot  = { gelcoat:0, resina:0, marmolina:0, catalizador:0 };
  for (let i=1; i<rows.length; i++) {
    const fila = rows[i];
    const fs   = String(fila[KPIS_COLS.fecha]||"");
    let fd;
    if (fs.includes("/")) { const p=fs.split("/"); fd=new Date(+p[2],+p[1]-1,+p[0]); }
    else { const m=fs.match(/(\d{4})-(\d{2})-(\d{2})/); if(!m) continue; fd=new Date(+m[1],+m[2]-1,+m[3]); }
    const fStr = fd.toISOString().slice(0,10);
    if (fStr < inicio || fStr > fin) continue;
    tot.gelcoat      += parseFloat(String(fila[KPIS_COLS.gelcoat]   ||"0").replace(/,/g,""))||0;
    tot.resina       += parseFloat(String(fila[KPIS_COLS.resina]    ||"0").replace(/,/g,""))||0;
    tot.marmolina    += parseFloat(String(fila[KPIS_COLS.marmolina] ||"0").replace(/,/g,""))||0;
    tot.catalizador  += parseFloat(String(fila[KPIS_COLS.catalizador]||"0").replace(/,/g,""))||0;
  }
  return {
    Gelcoat:   round2(tot.gelcoat),
    Butanox:   round2(tot.catalizador / 2),
    Resina:    round2(tot.resina),
    Norox:     round2(tot.catalizador / 2),
    Marmolina: round2(tot.marmolina),
  };
}

const SW_MAT_LABELS = {
  gelcoat:   'Gel Coat',
  butanox:   'Butanox M-50',
  resina:    'Resina PMS 7103',
  norox:     'Norox 900',
  marmolina: 'Marmolina Estens',
};
const SW_MAT_COLS = {
  gelcoat:   'Gelcoat (kg)',
  butanox:   'Butanox M-50 (kg)',
  resina:    'Resina (kg)',
  norox:     'Norox (kg)',
  marmolina: 'Marmolina (kg)',
};
const SW_MAT_COLORS = {
  gelcoat:'#3b82f6', butanox:'#8b5cf6', resina:'#f59e0b', norox:'#06b6d4', marmolina:'#22c55e'
};

// Convierte cualquier fecha (DD/MM/YYYY o YYYY-MM-DD) a "YYYY-MM"
function fechaAM(s) {
  const d = parseDate(s); if (!d) return "";
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}

function getPrecioMesSW(añoMes, matKey) {
  const label = SW_MAT_LABELS[matKey];
  if (!label) return 0;
  // Filtrar registros del material y ordenar por mes desc
  const candidatos = PRECIOS_RAW
    .filter(r => String(r["Material"] || "").trim() === label)
    .sort((a, b) => String(b["Año-Mes"] || "").localeCompare(String(a["Año-Mes"] || "")));
  if (!candidatos.length) return 0;
  // Buscar precio exacto del mes
  const exacto = candidatos.find(r => String(r["Año-Mes"] || "").slice(0,7) === añoMes);
  if (exacto) return parseFloat(String(exacto["Precio USD/kg"] || "0").replace(",", ".")) || 0;
  // Fallback: precio del mes más reciente anterior al mes buscado
  const anterior = candidatos.find(r => String(r["Año-Mes"] || "").slice(0,7) <= añoMes);
  if (anterior) return parseFloat(String(anterior["Precio USD/kg"] || "0").replace(",", ".")) || 0;
  // Si todo lo disponible es posterior, usar el más antiguo disponible
  return parseFloat(String(candidatos[candidatos.length-1]["Precio USD/kg"] || "0").replace(",", ".")) || 0;
}

// ── renderCostos Shower ───────────────────────────────────
function renderCostos() {

    const mar = parseFloat(String(r[SW_MAT_COLS.marmolina] || "0").replace(",",".")) || 0;
    if (!kilos && !gc) return;
    if (!modelosMap[desc]) modelosMap[desc] = { count:0, kilos:0, gc:0, but:0, res:0, nor:0, mar:0, am };
    const d = modelosMap[desc];
    d.count++; d.kilos+=kilos; d.gc+=gc; d.but+=but; d.res+=res; d.nor+=nor; d.mar+=mar;
    d.am = am;
  });

  const modelosCost = Object.entries(modelosMap).map(([desc, d]) => {

    const pnor = getPrecioMesSW(am, 'norox');
    const pmar = getPrecioMesSW(am, 'marmolina');
    const n    = d.count || 1;
    const costoPza = r2(
      (d.gc/n)*pgc + (d.but/n)*pbut + (d.res/n)*pres + (d.nor/n)*pnor + (d.mar/n)*pmar
    );
    return { desc, count:d.count, kilosProm:r2(d.kilos/n), costoPza };
  }).filter(m => m.count > 0).sort((a,b) => b.costoPza - a.costoPza);

  const chartH = Math.max(200, Math.min(modelosCost.length * 28 + 60, 520));
  let graficaHtml = `<div class="card" style="margin-bottom:14px">
    <div class="card-title">Costo por Patrón/Medida <span>${modelosCost.length} modelos en el período · USD/pared · mayor → menor</span></div>
    ${modelosCost.length === 0
      ? `<div class="empty">Sin producción en el período — verifica fechas o ejecuta sync_precios_shower.py</div>`
      : `<div style="position:relative;height:${chartH}px"><canvas id="chart-sw-costos"></canvas></div>

      ${matCols.map(m=>`<th style="text-align:right;color:${m.color}">${m.label}</th>`).join("")}

    preciosHtml += `<tr><td colspan="${matCols.length+1}" class="empty">Sin datos en PRECIOS_SW — ejecutar sync_precios_shower.py</td></tr>`;
  } else {

      const mes = new Date(am+"-15").toLocaleDateString("es-MX",{month:"short",year:"numeric"});

          const p = getPrecioMesSW(am, m.key);

        }).join("")}
      </tr>`;

  }
  preciosHtml += `</tbody></table></div></div>`;

  // ── 2. Costo de producción por mes ─────────────────────
  const prodMeses = {};
  TEORICO_RAW.forEach(r => {
    if (!enPeriodo(r["Fecha"])) return;

      <th style="text-align:right;color:#22c55e">Mar $/pared</th>

      <th style="text-align:right">Total $ Mes</th>
    </tr></thead><tbody>`;

  if (prodList.length === 0) {
    costoProdHtml += `<tr><td colspan="8" class="empty">Sin producción en el período</td></tr>`;
  } else {
    let totParedes=0, totMes=0;
    prodList.forEach(am => {

    </tr>`;
  }
  costoProdHtml += `</tbody></table></div></div>`;

  // ── DEBUG TEMPORAL ───────────────────────────────────────
  const _dbg = (() => {

// ── Cargar ────────────────────────────────────────────────
async function cargar(){
  document.getElementById("main-content").innerHTML=`<div class="loading"><div class="spinner"></div><div>Conectando con Google Sheets…</div></div>`;
  try{
    const [r0,r1,r2,r3,r4,r5,r6] = await Promise.allSettled([
      fetchSheet(SHEET_ID,"CONSUMOS_DIARIOS"),
      fetchSheet(SHEET_ID,"SALIDAS_FABRICACION"),
      fetchSheet(SHEET_ID,"LLEGADAS_ALMACEN"),
      fetchSheet(SHEET_ID,"INVENTARIOS"),
      fetchSheetRaw(KPIS_SHEET_ID,"PRODUCCION L1"),
      fetchSheetRaw(KPIS_SHEET_ID,"PRODUCCION L2"),
      fetchSheet(SHEET_ID,"PRECIOS_SW"),
    ]);
    TEORICO_RAW    = r0.status==="fulfilled" ? r0.value : [];
    FAB_RAW        = r1.status==="fulfilled" ? r1.value : [];
    ALM_RAW        = r2.status==="fulfilled" ? r2.value : [];
    INVENTARIOS_RAW= r3.status==="fulfilled" ? r3.value : [];
    KPIS_L1        = r4.status==="fulfilled" ? r4.value : [];
    KPIS_L2        = r5.status==="fulfilled" ? r5.value : [];
    PRECIOS_RAW    = r6.status==="fulfilled" ? r6.value : [];
    document.getElementById("sidebar-update").textContent=
      `Actualizado ${new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}`;
    render();
  }catch(e){
    document.getElementById("main-content").innerHTML=
      `<div class="loading"><div style="color:var(--danger)">❌ Error: ${e.message}</div></div>`;
  }
}


// ── Corte Semanal ─────────────────────────────────────────
function renderCorte() {
  document.getElementById("topbar-sub").textContent = "Inventario inicial + Entradas − Inventario final vs Teórico";

  if (!INVENTARIOS_RAW || INVENTARIOS_RAW.length === 0) {
    document.getElementById("main-content").innerHTML =
      '<div class="loading"><div class="empty">Sin datos en hoja INVENTARIOS.<br>Corre sync_inventarios.py primero.</div></div>';
    return;
  }

  // Agrupar por semana y por Línea (""=total, "L1", "L2")
  const semanas = {};
  INVENTARIOS_RAW.forEach(r => {
    const sem = r["Semana"] || "";
    if (!sem || sem === "Semana") return;
    const linea = r["Línea"] || "";   // "" para filas del script Python, "L1"/"L2" de la app web
    if (!semanas[sem]) semanas[sem] = { label:sem, inicio:r["Fecha Inicio"]||"", fin:r["Fecha Fin"]||"", lineas:{} };
    if (!semanas[sem].lineas[linea]) semanas[sem].lineas[linea] = {};
    const mat = r["Material"] || "";
    if (mat) semanas[sem].lineas[linea][mat] = r;
  });

  const semList = Object.values(semanas).sort((a,b)=>a.label.localeCompare(b.label));

  if (semList.length === 0) {
    document.getElementById("main-content").innerHTML =
      '<div class="loading"><div class="empty">Sin datos en hoja INVENTARIOS.</div></div>';
    return;
  }

  const semActual = window._corteSemana || semList[semList.length-1].label;

  const sel = document.getElementById("sel-semana");
  if(sel){
    sel.innerHTML = semList.map(s=>`<option value="${s.label}" ${s.label===semActual?"selected":""}>${s.label} · ${s.inicio} → ${s.fin}</option>`).join("");
  }

  const sem = semanas[semActual] || semList[semList.length-1];
  const MATS = ['Gelcoat','Butanox','Resina','Norox','Marmolina'];
  const MAT_KEY = {Gelcoat:"Gelcoat", Butanox:"Butanox M-50", Resina:"Resina", Norox:"Norox", Marmolina:"Marmolina"};
  const MAT_COLOR = {Gelcoat:"#3b82f6",Butanox:"#8b5cf6",Resina:"#f59e0b",Norox:"#06b6d4",Marmolina:"#22c55e"};
  const linLbl = LINEA ? `Línea ${LINEA}` : "Todas las líneas";

  // Seleccionar datos de inventario según filtro de línea
  // LINEA="" → usar filas del script (Línea=""), LINEA="1"→"L1", LINEA="2"→"L2"
  const lineaKey  = LINEA==="1" ? "L1" : LINEA==="2" ? "L2" : "";
  const matsLinea = (sem.lineas && (sem.lineas[lineaKey] || sem.lineas[""])) || {};
  const matsL1    = (sem.lineas && sem.lineas["L1"]) || {};
  const matsL2    = (sem.lineas && sem.lineas["L2"]) || {};

  // ── Consumo real desde KPIS para este rango ─────────────
  const kpisReal = calcFisicoRango(sem.inicio, sem.fin);

  // ── Salidas a Fabricación para este rango (de FAB_RAW) ───
  const MAT_TO_KEY = {Gelcoat:"gelcoat",Butanox:"butanox",Resina:"resina",Norox:"norox",Marmolina:"marmolina"};
  const salFabSem = {gelcoat:0,butanox:0,resina:0,norox:0,marmolina:0};
  FAB_RAW.forEach(r => {
    const f = (r["Fecha"]||"").slice(0,10);
    if (!f || f < sem.inicio || f > sem.fin) return;
    if (LINEA && String(r["Linea"]||"").trim() !== LINEA) return;
    const mat = LABEL_MAT[r["Material"]] || null;
    if (!mat) return;
    salFabSem[mat] += parseFloat((r["Cantidad (kg)"]||"").replace(",","."))||0;
  });

  // ── KPIs de la semana ───────────────────────────────────
  const kpiMats = MATS.map(m => {
    const r      = matsLinea[m] || {};
    const key    = MAT_TO_KEY[m];
    const teo    = parseFloat(r["Teórico (kg)"]||"") || 0;
    const invIni = parseFloat(r["Inv. Inicial (kg)"]||"") || null;
    const entOdo = parseFloat(r["Entradas Odoo (kg)"]||"") || 0;
    const invFin = parseFloat(r["Inv. Final (kg)"]||"") || null;
    const salFab = round2(salFabSem[key] || 0);
    // Consumo real: preferir KPIS físico, fallback a hoja INVENTARIOS
    const consReal = kpisReal[m] > 0 ? kpisReal[m] : (parseFloat(r["Consumo Real (kg)"]||"")||null);
    const diff     = consReal !== null ? round2(consReal - teo) : null;
    const pct      = consReal !== null && teo ? round2((consReal-teo)/teo*100) : null;
    return { m, consReal, teo, invIni, entOdo, invFin, salFab, diff, pct };
  });

  const totalReal  = kpiMats.reduce((s,k)=>s+(k.consReal||0),0);
  const totalTeo   = kpiMats.reduce((s,k)=>s+k.teo,0);
  const totalPct   = totalTeo ? ((totalReal-totalTeo)/totalTeo*100) : 0;
  const pendientes = kpiMats.filter(k=>k.consReal===null||k.consReal===0).length;
  const totalParedes = TEORICO_RAW.filter(r => {
    const f = (r["Fecha"]||"").slice(0,10);
    if (f < sem.inicio || f > sem.fin) return false;
    if (LINEA && String(r["Linea"]||"").trim() !== LINEA) return false;
    return true;
  }).length;

  let html = `
  <div class="metrics" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
    <div class="metric">
      <div class="metric-label">Semana</div>
      <div class="metric-val white" style="font-size:15px">${sem.label}</div>
      <div class="metric-sub">${sem.inicio} → ${sem.fin} · ${linLbl}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Paredes vaciadas</div>
      <div class="metric-val" style="color:var(--accent2)">${totalParedes.toLocaleString()}</div>
      <div class="metric-sub">${linLbl}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Teórico semana</div>
      <div class="metric-val" style="color:#3b82f6">${fmtN(totalTeo)}<span style="font-size:12px"> kg</span></div>
      <div class="metric-sub">calculado desde producción</div>
    </div>
    <div class="metric">
      <div class="metric-label">Consumo Real (KPIS)</div>
      <div class="metric-val" style="color:${pendientes>0?"var(--muted)":clrP(totalPct)}">${pendientes>0?"⏳ Sin datos":fmtN(totalReal)+" kg"}</div>
      <div class="metric-sub">${pendientes>0?"Sin datos en KPIS":fmtP(totalPct)+" vs teórico"}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Materiales con corte</div>
      <div class="metric-val ${pendientes===0?"green":"amber"}">${MATS.length-pendientes} / ${MATS.length}</div>
      <div class="metric-sub">${pendientes>0?"Falta inventario":"Corte completo ✅"}</div>
    </div>
  </div>`;

  // ── Tabla inventario por material ───────────────────────
  html += `
  <div class="card" style="margin-bottom:14px">
    <div class="card-title">Corte de Inventario — ${sem.label} <span>${sem.inicio} → ${sem.fin}</span></div>
    <div style="overflow-x:auto">
    <table style="min-width:860px">
      <thead><tr>
        <th>Material</th>
        <th style="text-align:right">Inv. Inicial</th>
        <th style="text-align:right;color:#6b7280">Entradas Odoo</th>
        <th style="text-align:right;color:#f59e0b">Salidas Fabricación</th>
        <th style="text-align:right">Inv. Final</th>
        <th style="text-align:right;color:#22c55e">Consumo Real</th>
        <th style="text-align:right;color:#3b82f6">Teórico</th>
        <th style="text-align:right">Diferencia kg</th>
        <th style="text-align:right">Diff %</th>
        <th>Estado</th>
      </tr></thead>
      <tbody>
      ${kpiMats.map(k=>{
        const ok = k.consReal !== null;
        const totalFab = kpiMats.reduce((s,x)=>s+x.salFab,0);
        const diffFab  = ok ? round2(k.consReal - k.salFab) : null;
        return `<tr>
          <td style="font-weight:600;color:${MAT_COLOR[k.m]}">${k.m}</td>
          <td class="mono" style="text-align:right;color:${k.invIni!==null?"var(--text)":"var(--muted)"}">${k.invIni!==null?fmtN(k.invIni):"📝"}</td>
          <td class="mono" style="text-align:right;color:#6b7280">${fmtN(k.entOdo)}</td>
          <td class="mono" style="text-align:right;color:${k.salFab>0?"#f59e0b":"var(--muted)"}">${k.salFab>0?fmtN(k.salFab):"—"}</td>
          <td class="mono" style="text-align:right;color:${k.invFin!==null?"var(--text)":"var(--muted)"}">${k.invFin!==null?fmtN(k.invFin):"📝"}</td>
          <td class="mono" style="text-align:right;color:${ok?clrP(k.pct||0):"var(--muted)"}">${ok?fmtN(k.consReal):"—"}</td>
          <td class="mono" style="text-align:right;color:#3b82f6">${fmtN(k.teo)}</td>
          <td class="mono" style="text-align:right;color:${ok?clrP(k.pct||0):"var(--muted)"}">${ok&&k.diff!==null?(k.diff>=0?"+":"")+fmtN(k.diff):"—"}</td>
          <td class="mono" style="text-align:right;color:${ok?clrP(k.pct||0):"var(--muted)"}">${ok&&k.pct!==null?fmtP(k.pct):"—"}</td>
          <td>${ok?estadoBadge(k.pct||0):'<span style="color:var(--muted);font-size:11px">⏳ Pendiente</span>'}</td>
        </tr>`;
      }).join("")}
      ${(()=>{
        const totalFab = kpiMats.reduce((s,k)=>s+k.salFab,0);
        const totalEntOdo = kpiMats.reduce((s,k)=>s+k.entOdo,0);
        return `<tr style="font-weight:700;border-top:2px solid var(--border)">
          <td>TOTAL</td>
          <td></td>
          <td class="mono" style="text-align:right;color:#6b7280">${fmtN(totalEntOdo)}</td>
          <td class="mono" style="text-align:right;color:${totalFab>0?"#f59e0b":"var(--muted)"}">${totalFab>0?fmtN(totalFab):"—"}</td>
          <td></td>
          <td class="mono" style="text-align:right;color:${pendientes>0?"var(--muted)":clrP(totalPct)}">${pendientes>0?"—":fmtN(totalReal)}</td>
          <td class="mono" style="text-align:right;color:#3b82f6">${fmtN(totalTeo)}</td>
          <td class="mono" style="text-align:right;color:${clrP(totalPct)}">${pendientes>0?"—":(totalReal-totalTeo>=0?"+":"")+fmtN(totalReal-totalTeo)}</td>
          <td class="mono" style="text-align:right;color:${clrP(totalPct)}">${pendientes>0?"—":fmtP(totalPct)}</td>
          <td>${pendientes>0?'<span style="color:var(--muted);font-size:11px">⏳</span>':estadoBadge(totalPct)}</td>
        </tr>`;
      })()}
      </tbody>
    </table>
    </div>
  </div>`;

  // ── Producción día a día ────────────────────────────────
  const diasMap = {};

  // Teórico por día desde CONSUMOS_DIARIOS
  TEORICO_RAW.forEach(r => {
    const f = (r["Fecha"]||"").slice(0,10);
    if (!f || f < sem.inicio || f > sem.fin) return;
    if (LINEA && String(r["Linea"]||"").trim() !== LINEA) return;
    if (!diasMap[f]) diasMap[f] = { paredes:0, lineas:new Set(), teoGelcoat:0, teoButanox:0, teoResina:0, teoNorox:0, teoMarmolina:0, teoTotal:0 };
    const d = diasMap[f];
    d.paredes++;
    if (r["Linea"]) d.lineas.add(r["Linea"]);
    MATS.forEach(m => {
      const col = MAT_KEY[m];
      const v   = parseFloat((r[col]||"").toString().replace(",",".")) || 0;
      d["teo"+m] = (d["teo"+m]||0) + v;
      d.teoTotal += v;
    });
  });

  // Real físico por día desde KPIS (mismo filtro de línea)
  const kpisRows = LINEA==="1" ? KPIS_L1 : LINEA==="2" ? KPIS_L2 : [...KPIS_L1, ...KPIS_L2];
  kpisRows.slice(1).forEach(fila => {
    const fs = String(fila[KPIS_COLS.fecha]||"");
    let fd;
    if (fs.includes("/")) { const p=fs.split("/"); fd=new Date(+p[2],+p[1]-1,+p[0]); }
    else { const m=fs.match(/(\d{4})-(\d{2})-(\d{2})/); if(!m) return; fd=new Date(+m[1],+m[2]-1,+m[3]); }
    const f = fd.toISOString().slice(0,10);
    if (f < sem.inicio || f > sem.fin) return;
    if (!diasMap[f]) diasMap[f] = { paredes:0, lineas:new Set(), teoGelcoat:0, teoButanox:0, teoResina:0, teoNorox:0, teoMarmolina:0, teoTotal:0 };
    const d = diasMap[f];
    const gelcoat = parseFloat(String(fila[KPIS_COLS.gelcoat]   ||"0").replace(/,/g,""))||0;
    const resina  = parseFloat(String(fila[KPIS_COLS.resina]    ||"0").replace(/,/g,""))||0;
    const marmo   = parseFloat(String(fila[KPIS_COLS.marmolina] ||"0").replace(/,/g,""))||0;
    const catal   = parseFloat(String(fila[KPIS_COLS.catalizador]||"0").replace(/,/g,""))||0;
    d.realGelcoat   = (d.realGelcoat  ||0) + gelcoat;
    d.realResina    = (d.realResina   ||0) + resina;
    d.realMarmolina = (d.realMarmolina||0) + marmo;
    d.realCatal     = (d.realCatal    ||0) + catal;
    d.realTotal     = (d.realTotal    ||0) + gelcoat + resina + marmo + catal;
  });

  const dias = Object.keys(diasMap).sort();
  const totDia = { paredes:0, teoTotal:0, realTotal:0 };
  MATS.forEach(m => { totDia["teo"+m]=0; });
  dias.forEach(f => {
    const d = diasMap[f];
    totDia.paredes  += d.paredes;
    totDia.teoTotal += d.teoTotal;
    totDia.realTotal= (totDia.realTotal||0) + (d.realTotal||0);
    MATS.forEach(m => { totDia["teo"+m] += d["teo"+m]||0; });
  });
  const totDiff    = totDia.realTotal && totDia.teoTotal ? round2((totDia.realTotal - totDia.teoTotal)/totDia.teoTotal*100) : null;

  const diasSemana = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  html += `
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-header-title">Producción Día a Día · ${linLbl}</div>
      <span style="font-size:11px;color:var(--muted)">${dias.length} días · ${totDia.paredes.toLocaleString()} paredes</span>
    </div>
    <table>
      <thead>
        <tr>
          <th rowspan="2">Día</th>
          <th rowspan="2">Fecha</th>
          <th rowspan="2" style="text-align:right">Paredes</th>
          <th colspan="5" style="text-align:center;border-bottom:1px solid var(--border);color:var(--accent2)">Teórico (kg)</th>
          <th rowspan="2" style="text-align:right;border-left:2px solid var(--border)">Teo Total</th>
          <th rowspan="2" style="text-align:right;color:#22c55e">Real KPIS</th>
          <th rowspan="2" style="text-align:right">Diff %</th>
        </tr>
        <tr>
          <th style="text-align:right;color:${MAT_COLOR.Gelcoat}">Gelcoat</th>
          <th style="text-align:right;color:${MAT_COLOR.Butanox}">Butanox</th>
          <th style="text-align:right;color:${MAT_COLOR.Resina}">Resina</th>
          <th style="text-align:right;color:${MAT_COLOR.Norox}">Norox</th>
          <th style="text-align:right;color:${MAT_COLOR.Marmolina}">Marmolina</th>
        </tr>
      </thead>
      <tbody>
      ${dias.length===0
        ? `<tr><td colspan="11" class="empty">Sin registros de producción en este período</td></tr>`
        : dias.map(f => {
            const d       = diasMap[f];
            const dow     = diasSemana[new Date(f+"T12:00:00").getDay()];
            const fmtFecha= new Date(f+"T12:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"short"});
            const real    = d.realTotal || 0;
            const teo     = d.teoTotal  || 0;
            const hasReal = real > 0;
            const pct     = hasReal && teo ? round2((real-teo)/teo*100) : null;
            return `<tr>
              <td style="color:var(--muted);font-weight:600">${dow}</td>
              <td class="mono">${fmtFecha}</td>
              <td class="mono" style="text-align:right">${d.paredes.toLocaleString()}</td>
              <td class="mono" style="text-align:right;color:${MAT_COLOR.Gelcoat}">${fmtN(d.teoGelcoat||0)}</td>
              <td class="mono" style="text-align:right;color:${MAT_COLOR.Butanox}">${fmtN(d.teoButanox||0)}</td>
              <td class="mono" style="text-align:right;color:${MAT_COLOR.Resina}">${fmtN(d.teoResina||0)}</td>
              <td class="mono" style="text-align:right;color:${MAT_COLOR.Norox}">${fmtN(d.teoNorox||0)}</td>
              <td class="mono" style="text-align:right;color:${MAT_COLOR.Marmolina}">${fmtN(d.teoMarmolina||0)}</td>
              <td class="mono" style="text-align:right;font-weight:600;border-left:2px solid var(--border)">${fmtN(teo)}</td>
              <td class="mono" style="text-align:right;color:${hasReal?"#22c55e":"var(--muted)"}">${hasReal?fmtN(real):"—"}</td>
              <td class="mono" style="text-align:right;color:${pct!==null?clrP(pct):"var(--muted)"};font-weight:${pct!==null?"600":"400"}">${pct!==null?fmtP(pct):"—"}</td>
            </tr>`;
          }).join("")
      }
      <tr style="font-weight:700;border-top:2px solid var(--border);background:rgba(255,255,255,.03)">
        <td colspan="2" style="color:var(--muted)">TOTAL SEMANA</td>
        <td class="mono" style="text-align:right">${totDia.paredes.toLocaleString()}</td>
        <td class="mono" style="text-align:right;color:${MAT_COLOR.Gelcoat}">${fmtN(totDia.teoGelcoat)}</td>
        <td class="mono" style="text-align:right;color:${MAT_COLOR.Butanox}">${fmtN(totDia.teoButanox)}</td>
        <td class="mono" style="text-align:right;color:${MAT_COLOR.Resina}">${fmtN(totDia.teoResina)}</td>
        <td class="mono" style="text-align:right;color:${MAT_COLOR.Norox}">${fmtN(totDia.teoNorox)}</td>
        <td class="mono" style="text-align:right;color:${MAT_COLOR.Marmolina}">${fmtN(totDia.teoMarmolina)}</td>
        <td class="mono" style="text-align:right;border-left:2px solid var(--border)">${fmtN(totDia.teoTotal)}</td>
        <td class="mono" style="text-align:right;color:${totDia.realTotal?"#22c55e":"var(--muted)"}">${totDia.realTotal?fmtN(totDia.realTotal):"—"}</td>
        <td class="mono" style="text-align:right;color:${totDiff!==null?clrP(totDiff):"var(--muted)"}">${totDiff!==null?fmtP(totDiff):"—"}</td>
      </tr>
      </tbody>
    </table>
  </div>`;

  // ── Formulario captura de inventario por Línea ─────────
  const invInputStyle = `width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;text-align:right;outline:none;`;

  function invRows(linea, mats) {
    const pfx = linea === 'L1' ? 'l1' : 'l2';
    return MATS.map(m => {
      const row = mats[m] || {};
      const ini = row["Inv. Inicial (kg)"] || '';
      const fin = row["Inv. Final (kg)"]   || '';
      return `<tr>
        <td style="font-size:12px;font-weight:500;color:${MAT_COLOR[m]};padding:6px 8px">${m}</td>
        <td style="padding:4px 6px">
          <input type="number" step="0.01" id="inv_${pfx}_ini_${m}" value="${ini}"
            style="${invInputStyle}" placeholder="—" oninput="recalcInvRow('${pfx}','${m}')">
        </td>
        <td style="padding:4px 6px">
          <input type="number" step="0.01" id="inv_${pfx}_fin_${m}" value="${fin}"
            style="${invInputStyle}" placeholder="—" oninput="recalcInvRow('${pfx}','${m}')">
        </td>
        <td class="mono" id="inv_${pfx}_cons_${m}" style="padding:6px 8px;text-align:right;font-size:11px;color:var(--muted)">
          ${ini !== '' && fin !== '' ? fmtN(parseFloat(ini||0) - parseFloat(fin||0)) : '—'}
        </td>
      </tr>`;
    }).join('');
  }

  const showL1 = LINEA === '' || LINEA === '1';
  const showL2 = LINEA === '' || LINEA === '2';

  html += `
  <div class="card" style="margin-bottom:14px">
    <div class="card-title" style="margin-bottom:16px">
      📋 Captura de Inventario
      <span>${sem.label} · ${sem.inicio} → ${sem.fin}</span>
    </div>
    <div style="display:grid;grid-template-columns:${showL1&&showL2?'1fr 1fr':'1fr'};gap:20px">
      ${showL1 ? `
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="badge b-l1" style="font-size:11px;padding:3px 10px">L1</span>
          <span style="font-size:12px;font-weight:600;color:#60a5fa">Línea 1</span>
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>
            <th style="text-align:left;font-size:10px;color:var(--muted);padding:4px 8px 8px">Material</th>
            <th style="text-align:right;font-size:10px;color:var(--muted);padding:4px 8px 8px">Inv. Inicial (kg)</th>

      ${showL2 ? `

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="badge b-l2" style="font-size:11px;padding:3px 10px">L2</span>
          <span style="font-size:12px;font-weight:600;color:#a78bfa">Línea 2</span>
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>
            <th style="text-align:left;font-size:10px;color:var(--muted);padding:4px 8px 8px">Material</th>
            <th style="text-align:right;font-size:10px;color:var(--muted);padding:4px 8px 8px">Inv. Inicial (kg)</th>
            <th style="text-align:right;font-size:10px;color:var(--muted);padding:4px 8px 8px">Inv. Final (kg)</th>
            <th style="text-align:right;font-size:10px;color:var(--muted);padding:4px 8px 8px">Consumo</th>
          </tr></thead>
          <tbody>${invRows('L2', matsL2)}</tbody>
        </table>
      </div>` : ''}
    </div>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div style="font-size:11px;color:var(--muted)">
        💡 Los campos en blanco no se guardan. Entradas Odoo las actualiza el script <code style="color:var(--accent)">sync_inventarios.py</code>.
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:11px;color:var(--muted)" id="inv-save-status"></span>
        <button class="btn btn-green" onclick="guardarInventario('${sem.label}','${sem.inicio}','${sem.fin}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Guardar Inventario
        </button>
      </div>
    </div>
  </div>`;

  document.getElementById("main-content").innerHTML = html;
}

// ── Recalcular consumo al escribir en el form ─────────────
function recalcInvRow(pfx, mat) {
  const ini = parseFloat(document.getElementById(`inv_${pfx}_ini_${mat}`)?.value) || 0;
  const fin = parseFloat(document.getElementById(`inv_${pfx}_fin_${mat}`)?.value) || 0;
  const el  = document.getElementById(`inv_${pfx}_cons_${mat}`);
  if (!el) return;
  const iniEl = document.getElementById(`inv_${pfx}_ini_${mat}`);
  const finEl = document.getElementById(`inv_${pfx}_fin_${mat}`);
  el.textContent = (iniEl?.value !== '' || finEl?.value !== '') ? ((ini - fin).toFixed(1)) + ' kg' : '—';
}

// ── Guardar inventario via GAS ────────────────────────────
async function guardarInventario(semana, fechaIni, fechaFin) {
  const MATS_INV = ['Gelcoat','Butanox','Resina','Norox','Marmolina'];
  const status   = document.getElementById('inv-save-status');
  if (status) status.textContent = '⏳ Guardando…';

  const rows = [];
  ['L1','L2'].forEach(linea => {
    const pfx = linea === 'L1' ? 'l1' : 'l2';
    MATS_INV.forEach(m => {
      const iniEl = document.getElementById(`inv_${pfx}_ini_${m}`);
      const finEl = document.getElementById(`inv_${pfx}_fin_${m}`);
      if (!iniEl && !finEl) return;  // esta línea no se muestra
      const ini = iniEl && iniEl.value !== '' ? parseFloat(iniEl.value) : '';
      const fin = finEl && finEl.value !== '' ? parseFloat(finEl.value) : '';
      if (ini === '' && fin === '') return;  // nada que guardar
      rows.push({ semana, fechaIni, fechaFin, material: m, linea, invIni: ini, invFin: fin });
    });
  });

  if (rows.length === 0) {
    if (status) status.textContent = '⚠ Sin datos para guardar';
    return;
  }

  try {
    const res  = await fetch(GAS_INV_URL, { method:'POST', body: JSON.stringify({ action:'upsert_inv', rows }) });
    const data = await res.json();
    if (data.ok) {
      if (status) status.textContent = `✅ Guardado (${data.updated} registros) — ${new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}`;
      // Recargar datos para reflejar los cambios
      await cargar();
    } else {
      if (status) status.textContent = `❌ Error: ${data.error}`;
    }
  } catch(e) {
    if (status) status.textContent = `❌ Error de red: ${e.message}`;
  }
}

// ── (Ventas movida a produccion.html) ─────────────────────
function renderVentas_REMOVED() {
  document.getElementById("topbar-sub").textContent = "Pedidos de venta desde Odoo";

  if (!VENTAS_RAW || VENTAS_RAW.length === 0) {
    document.getElementById("main-content").innerHTML =
      `<div class="loading"><div class="empty">Sin datos en hoja VENTAS.<br>
       Corre <code style="color:var(--accent)">python odoo_ventas.py --dias 90</code> primero.</div></div>`;
    return;
  }

  const{desde,hasta} = getFechas();
  const datos = VENTAS_RAW.filter(r => {
    const f = (r["Fecha"]||"").slice(0,10);
    if (desde && f < desde) return false;
    if (hasta && f > hasta) return false;
    return true;
  });

  // ── KPIs ───────────────────────────────────────────────
  const confirmados = datos.filter(r => r["Estado"]==="Confirmado"||r["Estado"]==="Cerrado");
  const totalPiezas = confirmados.reduce((s,r)=>s+parseFloat(r["Cantidad"]||0),0);
  const totalMonto  = confirmados.reduce((s,r)=>s+parseFloat(r["Subtotal"]||0),0);
  const totalEntregado = confirmados.reduce((s,r)=>s+parseFloat(r["Entregado"]||0),0);
  const totalPendiente = confirmados.reduce((s,r)=>s+parseFloat(r["Pendiente"]||0),0);
  const pctEntrega  = totalPiezas ? Math.round(totalEntregado/totalPiezas*100) : 0;
  const hoyStr      = new Date().toISOString().slice(0,10);
  const vencidas    = confirmados.filter(r=>r["Fecha Entrega"]&&r["Fecha Entrega"]<hoyStr&&parseFloat(r["Pendiente"]||0)>0);
  const piezasVenc  = vencidas.reduce((s,r)=>s+parseFloat(r["Pendiente"]||0),0);

  // Por cliente
  const clientes = {};
  confirmados.forEach(r => {
    const c = r["Cliente"]||"—";
    if (!clientes[c]) clientes[c] = { piezas:0, monto:0, pedidos:new Set() };
    clientes[c].piezas += parseFloat(r["Cantidad"]||0);
    clientes[c].monto  += parseFloat(r["Subtotal"]||0);
    clientes[c].pedidos.add(r["Pedido"]);
  });
  const topClientes = Object.entries(clientes)
    .sort((a,b)=>b[1].monto-a[1].monto).slice(0,8);
  const maxMonto = topClientes[0]?.[1].monto || 1;

  // Por SKU/Producto
  const skuMap = {};
  confirmados.forEach(r => {
    const k = r["SKU"]||r["Producto"]||"—";
    if (!skuMap[k]) skuMap[k] = { piezas:0, monto:0 };
    skuMap[k].piezas += parseFloat(r["Cantidad"]||0);
    skuMap[k].monto  += parseFloat(r["Subtotal"]||0);
  });
  const topSKU = Object.entries(skuMap).sort((a,b)=>b[1].piezas-a[1].piezas).slice(0,10);
  const maxSKU = topSKU[0]?.[1].piezas || 1;

  // Por estado
  const estados = {};
  datos.forEach(r => { const e=r["Estado"]||"—"; estados[e]=(estados[e]||0)+parseFloat(r["Cantidad"]||0); });

  const fmtMXN = v => v.toLocaleString('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:0});

  let html = `
  <div class="metrics" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
    <div class="metric">
      <div class="metric-label">Piezas vendidas</div>
      <div class="metric-val" style="color:var(--accent2)">${Math.round(totalPiezas).toLocaleString()}</div>
      <div class="metric-sub">pedidos confirmados/cerrados</div>
    </div>
    <div class="metric">
      <div class="metric-label">Monto total</div>
      <div class="metric-val green" style="font-size:18px">${fmtMXN(totalMonto)}</div>
      <div class="metric-sub">${confirmados.length} líneas</div>
    </div>
    <div class="metric">
      <div class="metric-label">Entregado</div>
      <div class="metric-val" style="color:var(--accent)">${Math.round(totalEntregado).toLocaleString()}</div>
      <div class="metric-sub">${pctEntrega}% del total</div>
    </div>
    <div class="metric">
      <div class="metric-label">Pendiente entregar</div>
      <div class="metric-val" style="color:${totalPendiente>0?"var(--warn)":"var(--accent)"}">${Math.round(totalPendiente).toLocaleString()}</div>
      <div class="metric-sub">piezas por despachar</div>
    </div>
    <div class="metric">
      <div class="metric-label">Entregas vencidas</div>
      <div class="metric-val" style="color:${vencidas.length>0?"var(--danger)":"var(--accent)"}">${vencidas.length>0?"⚠ "+Math.round(piezasVenc)+" pzas":"✓ Al día"}</div>
      <div class="metric-sub">${vencidas.length>0?vencidas.length+" líneas atrasadas":"Sin retrasos"}</div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Top Clientes por Monto <span>confirmados + cerrados</span></div>
      <div class="bar-chart">
        ${topClientes.map(([c,v])=>`
        <div class="bar-row">
          <div class="bar-label" title="${c}">${c}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v.monto/maxMonto*100)}%;background:var(--accent2)"></div></div>
          <div style="width:80px;text-align:right;font-size:11px;color:var(--muted)">${fmtMXN(v.monto)}</div>
        </div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Top Productos por Piezas <span>confirmados + cerrados</span></div>
      <div class="bar-chart">
        ${topSKU.map(([k,v])=>`
        <div class="bar-row">
          <div class="bar-label" title="${k}">${k}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v.piezas/maxSKU*100)}%;background:var(--accent)"></div></div>
          <div class="bar-val">${Math.round(v.piezas)}</div>
        </div>`).join("")}
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-header-title">Detalle de Pedidos</div>
      <span style="font-size:11px;color:var(--muted)">${datos.length} líneas · ${[...new Set(datos.map(r=>r["Pedido"]))].length} pedidos</span>
    </div>
    <table>
      <thead><tr>
        <th>Fecha Pedido</th><th>Entrega Prog.</th><th>Pedido</th><th>Cliente</th>
        <th>SKU</th><th>Producto</th>
        <th style="text-align:right">Cant.</th>
        <th style="text-align:right">Subtotal</th>
        <th style="text-align:right">Entregado</th>
        <th style="text-align:right">Pendiente</th>
        <th>Estado</th>
      </tr></thead>
      <tbody>
      ${datos.length===0
        ? `<tr><td colspan="11" class="empty">Sin datos en el período</td></tr>`
        : datos.map(r=>{
            const est      = r["Estado"]||"—";
            const pend     = parseFloat(r["Pendiente"]||0);
            const bClr     = est==="Confirmado"?"b-ok":est==="Cerrado"?"b-l1":est==="Cancelado"?"b-danger":"b-warn";
            const fEnt     = r["Fecha Entrega"]||"";
            const hoy      = new Date().toISOString().slice(0,10);
            const vencida  = fEnt && fEnt < hoy && pend > 0;
            const proxima  = fEnt && fEnt >= hoy && fEnt <= new Date(Date.now()+7*86400000).toISOString().slice(0,10) && pend > 0;
            const entClr   = vencida?"var(--danger)":proxima?"var(--warn)":fEnt?"var(--text)":"var(--muted)";
            const entLabel = fEnt ? (vencida?`⚠ ${fEnt}`:proxima?`⏰ ${fEnt}`:fEnt) : "—";
            return `<tr>
              <td class="mono">${r["Fecha"]||"—"}</td>
              <td class="mono" style="color:${entClr};font-weight:${vencida||proxima?"600":"400"}">${entLabel}</td>
              <td class="mono" style="color:var(--accent2)">${r["Pedido"]||"—"}</td>
              <td style="max-width:150px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="${r["Cliente"]||""}">${r["Cliente"]||"—"}</td>
              <td class="mono" style="color:var(--accent)">${r["SKU"]||"—"}</td>
              <td style="max-width:160px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--muted)" title="${r["Producto"]||""}">${r["Producto"]||"—"}</td>
              <td class="mono" style="text-align:right">${parseFloat(r["Cantidad"]||0).toLocaleString()}</td>
              <td class="mono" style="text-align:right;font-weight:600">${fmtMXN(parseFloat(r["Subtotal"]||0))}</td>
              <td class="mono" style="text-align:right;color:var(--accent)">${parseFloat(r["Entregado"]||0).toLocaleString()}</td>
              <td class="mono" style="text-align:right;color:${pend>0?"var(--warn)":"var(--muted)"}">${pend>0?pend.toLocaleString():"—"}</td>
              <td><span class="badge ${bClr}">${est}</span></td>
            </tr>`;
          }).join("")
      }
      </tbody>
    </table>
  </div>`;

  document.getElementById("main-content").innerHTML = html;
}

function estadoBadge(pct){
  const v=Number(pct);
  if(Math.abs(v)<=5) return '<span class="badge b-ok">✓ OK</span>';
  if(v>5)            return '<span class="badge b-warn">⚠ Exceso</span>';
  return                    '<span class="badge b-danger">⚡ Faltante</span>';
}

  const hoy=new Date();
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  document.getElementById("fDesde").value=fmt(hoy);
  document.getElementById("fHasta").value=fmt(hoy);
  document.getElementById("fDesde").addEventListener("change",render);
  document.getElementById("fHasta").addEventListener("change",render);
  document.getElementById("fDesde").addEventListener("input",render);
  document.getElementById("fHasta").addEventListener("input",render);
  cargar();
})();
</script>
