@keyframes spin{to{transform:rotate(360deg);}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:750px;max-height:88vh;display:flex;flex-direction:column;}

<script>
const API_KEY  = "AIzaSyD2fUvrz6Mtl9eHP4tnVwEth76dBgeWIC0";
const SHEET_ID     = "1jhCWkJEKmfpnCj-2iQvlwsNNA8P8EejbPCM5vqs_7Ig"; // PRODUCCION MODULAR TOPS
const FAB_SHEET_ID = "1yKxgCkw20mfm2d6Rh__WdrgusgYvkg1fyGDYiJIMwbs"; // MVT SISTEM V2 (fabricacion)
// Pegar aquí la URL del GAS de inventarios una vez desplegado:
const GAS_INV_URL = "https://script.google.com/macros/s/AKfycbyONaUNT3OtxzYNsh8RD160YxSvuJVh3ndicfs5XZRDoAmBhC4-rld6iZ74hYuDm2my/exec";

// ── Factores de consumo (Pesos Solid White.xlsx) ─────────────
// GELCOAT     = PESO × 4.5%
// CAT_GC      = GELCOAT × 2.5%
// RESTO       = PESO - GELCOAT - CAT_GC
// RESINA      = RESTO × 18%
// CAT_RES     = RESINA × 2.5%
// MARMOLINA   = RESTO × 82%
const F_GEL = 0.045;  // gelcoat sobre PESO
const F_CAT = 0.025;  // catalizador sobre gelcoat (y sobre resina)
const F_RES = 0.18;   // resina sobre (PESO - gelcoat - cat_gc)
const F_MAR = 0.82;   // marmolina sobre (PESO - gelcoat - cat_gc)

let VISTA = "resumen", LINEA = "";
let TEORICO_RAW = [], FAB_RAW = [], ALM_RAW = [], INVENTARIOS_RAW = [], FISICO_RAW = [];
let PRECIOS_RAW = [], GRADOC_RAW = [], MERMA_RAW = [], REF_PESO_RAW = [];

// Mapa CODIGO → {peso, gelcoat_sw, gel_trans, cat_gc, resina, cat_res, titanio, marmolina}
// Se construye en cargar() a partir de REF_PESO_MVT
let REF_PESO_MAP = {};

const MATERIALES = [
  {key:"gelcoat",   label:"Gel Coat Sólido",   color:"#3b82f6"},
  {key:"gel_trans", label:"GC Transparente",   color:"#38bdf8"},  // L1 — MP-03-0003
  {key:"cat_gc",    label:"Cat. Gelcoat",       color:"#8b5cf6"},
  {key:"resina",    label:"Resina",             color:"#f59e0b"},
  {key:"cat_res",   label:"Cat. Resina",        color:"#06b6d4"},
  {key:"titanio",   label:"Titanio",            color:"#f97316"},  // MP-08-0001 — Laguna Flat
  {key:"marmolina", label:"Marmolina Estens",  color:"#22c55e"},
];

// Odoo no distingue cat_gc de cat_res — todos los movimientos de
// catalizador se registran bajo cat_gc; cat_res solo tiene valor teórico.
// Gel Coat Transparente (MP-03-0003, MP-03-0014) → gel_trans en físico;
// Odoo aún lo agrupa en "gelcoat" (misma categoría GEL COAT).
const LABEL_MAT = {
  "Gel Coat"                   : "gelcoat",
  "Gel Coat (todos colores)"   : "gelcoat",
  "Gel Coat Blanco"            : "gelcoat",
  "Gel Coat Transparente"      : "gel_trans",
  "Catalizador Gelcoat"        : "cat_gc",
  "Catalizador Trigonox 44B"   : "cat_gc",
  "Catalizador Norox 900"      : "cat_gc",
  "Catalizador Corpol PO-9000" : "cat_gc",
  "Catalizador Butanox M-50"   : "cat_gc",
  "Catalizador Norox 925"      : "cat_gc",
  "Resina"                     : "resina",
  "Resina 7090 Invierno"       : "resina",
  "Resina 7091 Verano"         : "resina",
  "Resina PMS 7103 Invierno"   : "resina",
  "Bioxido de Titanio"         : "titanio",
  "Titanio"                    : "titanio",
  "Marmolina Estens"           : "marmolina",
};

// ── Google Sheets ─────────────────────────────────────────────
async function fetchSheet(sheetId, name) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(name)}?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${name}`);
  const j = await r.json();
  const [hdrs, ...rows] = j.values || [];
  if (!hdrs) return [];
  return rows.map(r => { const o = {}; hdrs.forEach((h, i) => o[h] = r[i] ?? ""); return o; });
}

// ── Fechas ────────────────────────────────────────────────────
function getFechas() {
  return { desde: document.getElementById("fDesde")?.value || "", hasta: document.getElementById("fHasta")?.value || "" };
}

function parseDate(s) {
  if (!s) return null;
  // ISO YYYY-MM-DD
  const m1 = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m1) return new Date(+m1[1], +m1[2]-1, +m1[3]);
  // D/M/YYYY o DD/MM/YYYY (formato Sheets México)
  const m2 = String(s).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m2) return new Date(+m2[3], +m2[2]-1, +m2[1]);
  return null;
}

function enPeriodo(s) {
  const d = parseDate(s); if (!d) return false;
  const { desde, hasta } = getFechas();
  if (desde) { const [y,mo,dd] = desde.split("-").map(Number); if (d < new Date(y,mo-1,dd)) return false; }
  if (hasta) { const [y,mo,dd] = hasta.split("-").map(Number); if (d > new Date(y,mo-1,dd,23,59,59)) return false; }
  return true;
}

function fmtN(n)  { return Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}); }
function fmtP(n)  { const v=Number(n||0); return(v>=0?"+":"")+v.toFixed(1)+"%"; }
function clrP(p)  { const v=Number(p); if(Math.abs(v)<=5)return"var(--ga)"; if(v>5)return"var(--gb)"; return"var(--gc)"; }
function badge(p) { const v=Number(p); if(Math.abs(v)<=5)return`<span class="badge b-ok">✓ OK</span>`; if(v>5)return`<span class="badge b-warn">⚠ Exceso</span>`; return`<span class="badge b-danger">⚡ Faltante</span>`; }
function estadoBadge(p) { return badge(p); }
function round2(n) { return Math.round(n*100)/100; }

function lineaBadge(l) {
  const cls = l==="1"?"b-l1":l==="2"?"b-l2":l==="3"?"b-l3":l==="4"?"b-l4":"";
  return l ? `<span class="badge ${cls}">L${l}</span>` : `<span style="color:var(--muted)">—</span>`;
}

// ── Teórico desde Sistema fabricacion ────────────────────────
function calcTeorico(rows) {
  const tot = {}; MATERIALES.forEach(m => tot[m.key] = 0);
  let piezas = 0;
  rows.forEach(r => {
    if (!enPeriodo(r["FECHA"])) return;
    if ((r["ESTATUS"] || "") !== "Fabricado") return;
    // LINEA en el sheet: "Linea 1", "Linea 2", etc.
    const linNum = String(r["LINEA"] || "").replace(/[^0-9]/g, "").trim();
    if (LINEA && linNum !== LINEA) return;
    const peso = parseFloat(String(r["PESO"] || "0").replace(",", ".")) || 0;
    if (!peso) return;
    piezas++;
    const cant = parseFloat(String(r["CANTIDAD"] || "1")) || 1;
    const p = peso * cant;
    const gc    = round2(p * F_GEL);
    const catGc = round2(gc * F_CAT);
    const resto = p - gc - catGc;
    const res   = round2(resto * F_RES);
    tot.gelcoat  = round2(tot.gelcoat  + gc);
    tot.cat_gc   = round2(tot.cat_gc   + catGc);
    tot.resina   = round2(tot.resina   + res);
    tot.cat_res  = round2(tot.cat_res  + round2(res * F_CAT));
    tot.marmolina= round2(tot.marmolina+ round2(resto * F_MAR));
  });
  return { tot, piezas };
}

// ── Teórico rango fijo (para corte) ──────────────────────────
function calcTeoricoRango(inicio, fin) {
  const rows = TEORICO_RAW;
  const tot  = { gelcoat:0, cat_gc:0, resina:0, cat_res:0, marmolina:0 };
  rows.forEach(r => {
    const f = fechaISO(r["FECHA"]);
    if (!f || f < inicio || f > fin) return;
    if ((r["ESTATUS"] || "") !== "Fabricado") return;
    const linNum = String(r["LINEA"] || "").replace(/[^0-9]/g, "").trim();
    if (LINEA && linNum !== LINEA) return;
    const peso = parseFloat(String(r["PESO"] || "0").replace(",", ".")) || 0;
    if (!peso) return;
    const cant = parseFloat(String(r["CANTIDAD"] || "1")) || 1;
    const p = peso * cant;
    const gc    = round2(p * F_GEL);
    const catGc = round2(gc * F_CAT);
    const resto = p - gc - catGc;
    const res   = round2(resto * F_RES);
    tot.gelcoat  = round2(tot.gelcoat  + gc);
    tot.cat_gc   = round2(tot.cat_gc   + catGc);
    tot.resina   = round2(tot.resina   + res);
    tot.cat_res  = round2(tot.cat_res  + round2(res * F_CAT));
    tot.marmolina= round2(tot.marmolina+ round2(resto * F_MAR));
  });
  return { Gelcoat: tot.gelcoat, "Cat. Gelcoat": tot.cat_gc, Resina: tot.resina, "Cat. Resina": tot.cat_res, Marmolina: tot.marmolina };
}

function fechaISO(s) {
  const d = parseDate(s); if (!d) return null;
  return d.toISOString().slice(0,10);
}

// ── Consumo Físico acumulado ──────────────────────────────────
function calcFisico() {
  const tot = {}; MATERIALES.forEach(m => tot[m.key] = 0);
  FISICO_RAW.forEach(r => {
    if (!enPeriodo(r["Fecha"])) return;
    const ln = String(r["Linea"]||r["Línea"]||"").trim();
    if (LINEA && ln !== LINEA) return;
    tot.gelcoat  = round2(tot.gelcoat  + (parseFloat(r["Gelcoat (kg)"]      ||0)||0));
    tot.cat_gc   = round2(tot.cat_gc   + (parseFloat(r["Cat. Gelcoat (kg)"] ||0)||0));
    tot.resina   = round2(tot.resina   + (parseFloat(r["Resina (kg)"]       ||0)||0));
    tot.cat_res  = round2(tot.cat_res  + (parseFloat(r["Cat. Resina (kg)"]  ||0)||0));
    tot.marmolina= round2(tot.marmolina+ (parseFloat(r["Marmolina (kg)"]    ||0)||0));
  });
  return tot;
}

// ── Movimientos Odoo ─────────────────────────────────────────
function calcMovimientos(rows, sinFiltroLinea=false) {
  const tot = {}; MATERIALES.forEach(m => tot[m.key] = 0);
  const movs = [];
  rows.forEach(r => {
    if (!enPeriodo(r["Fecha"])) return;
    if (!sinFiltroLinea && LINEA && String(r["Linea"]||"").trim() !== LINEA) return;
    const mat = LABEL_MAT[r["Material"]] || r["Material"];
    const qty = parseFloat((r["Cantidad (kg)"]||"").replace(",",".")) || 0;
    if (tot[mat] !== undefined) tot[mat] += qty;
    movs.push({...r, _mat:mat, _qty:qty});
  });
  return { tot, movs };
}

// ── Render principal ─────────────────────────────────────────
function render() {
  const { tot: teo, piezas } = calcTeorico(TEORICO_RAW);
  const { tot: fab, movs: movsFab } = calcMovimientos(FAB_RAW, true); // sin filtro linea — no disponible en mov. almacén
  const { tot: alm, movs: movsAlm } = calcMovimientos(ALM_RAW, true); // idem llegadas
  const fis = calcFisico();
  const { desde, hasta } = getFechas();
  const linLbl = LINEA ? ` · Línea ${LINEA}` : "";
  document.getElementById("topbar-sub").textContent = `${desde} → ${hasta}${linLbl} · ${piezas.toLocaleString()} piezas`;

  if (VISTA === "resumen")       renderResumen(teo, fab, alm, fis, piezas);
  else if (VISTA === "fabricacion") renderMovimientos(movsFab, fab, teo, "Salidas hacia Fabricación");
  else if (VISTA === "almacen")     renderMovimientos(movsAlm, alm, teo, "Llegadas al Almacén", true);
  else if (VISTA === "corte")       renderCorte();
  else if (VISTA === "fisico")      renderFisico();
  else if (VISTA === "costos")      renderCostos();
}

// ── Resumen ──────────────────────────────────────────────────

// ── Corte Semanal ─────────────────────────────────────────────
function renderCorte() {
  document.getElementById("topbar-sub").textContent = "Inv. inicial + Entradas − Inv. final vs Teórico";

  if (!INVENTARIOS_RAW || INVENTARIOS_RAW.length === 0) {
    document.getElementById("main-content").innerHTML =
      `<div class="loading"><div class="empty">Sin datos en hoja INVENTARIOS_MVT.<br>Guarda un inventario primero usando el formulario de captura.</div></div>`;
    return;
  }

  const semanas = {};
  INVENTARIOS_RAW.forEach(r => {
    const sem = r["Semana"] || "";
    if (!sem || sem === "Semana") return;
    const linea = r["Línea"] || r["Linea"] || "";
    if (!semanas[sem]) semanas[sem] = { label:sem, inicio:r["Fecha Inicio"]||"", fin:r["Fecha Fin"]||"", lineas:{} };
    if (!semanas[sem].lineas[linea]) semanas[sem].lineas[linea] = {};
    const mat = r["Material"] || "";
    if (mat) semanas[sem].lineas[linea][mat] = r;
  });

  const semList = Object.values(semanas).sort((a,b) => a.label.localeCompare(b.label));
  if (semList.length === 0) {
    document.getElementById("main-content").innerHTML = '<div class="loading"><div class="empty">Sin semanas en INVENTARIOS_MVT.</div></div>';
    return;
  }

  const semActual = window._corteSemana || semList[semList.length-1].label;
  const sel = document.getElementById("sel-semana");
  if (sel) {
    sel.innerHTML = semList.map(s=>`<option value="${s.label}" ${s.label===semActual?"selected":""}>${s.label} · ${s.inicio} → ${s.fin}</option>`).join("");
  }

  const sem = semanas[semActual] || semList[semList.length-1];
  const MATS = ["Gelcoat","Cat. Gelcoat","Resina","Cat. Resina","Marmolina"];
  const MAT_COLOR = {Gelcoat:"#3b82f6","Cat. Gelcoat":"#8b5cf6",Resina:"#f59e0b","Cat. Resina":"#06b6d4",Marmolina:"#22c55e"};
  const MAT_TO_KEY = {Gelcoat:"gelcoat","Cat. Gelcoat":"cat_gc",Resina:"resina","Cat. Resina":"cat_res",Marmolina:"marmolina"};
  const linLbl = LINEA ? `Línea ${LINEA}` : "Todas las líneas";

  const lineaKey = LINEA==="1"?"L1":LINEA==="2"?"L2":LINEA==="3"?"L3":LINEA==="4"?"L4":"";
  const matsLinea = (sem.lineas[lineaKey] || sem.lineas[""]) || {};
  const matsL = {};
  ["L1","L2","L3","L4"].forEach(lk => { matsL[lk] = sem.lineas[lk] || {}; });

  // Teórico desde Sistema fabricacion para el rango de la semana
  const kpisReal = calcTeoricoRango(sem.inicio, sem.fin);

  // Salidas a fabricación (FAB_RAW) para el rango
  const salFabSem = {gelcoat:0,cat_gc:0,resina:0,cat_res:0,marmolina:0};
  FAB_RAW.forEach(r => {
    const f = fechaISO(r["Fecha"]) || (r["Fecha"]||"").slice(0,10);
    if (!f || f < sem.inicio || f > sem.fin) return;
    if (LINEA && String(r["Linea"]||"").trim() !== LINEA) return;
    const mat = LABEL_MAT[r["Material"]] || null;
    if (!mat) return;
    salFabSem[mat] += parseFloat((r["Cantidad (kg)"]||"").replace(",",".")) || 0;
  });

  const kpiMats = MATS.map(m => {
    const r   = matsLinea[m] || {};
    const key = MAT_TO_KEY[m];
    const teo    = parseFloat(r["Teórico (kg)"]||"") || 0;
    const invIni = r["Inv. Inicial (kg)"] !== undefined && r["Inv. Inicial (kg)"] !== "" ? parseFloat(r["Inv. Inicial (kg)"]) : null;
    const entOdo = parseFloat(r["Entradas Odoo (kg)"]||"") || 0;
    const invFin = r["Inv. Final (kg)"] !== undefined && r["Inv. Final (kg)"] !== "" ? parseFloat(r["Inv. Final (kg)"]) : null;
    const salFab = round2(salFabSem[key] || 0);
    const consReal = kpisReal[m] > 0 ? kpisReal[m] : (parseFloat(r["Consumo Real (kg)"]||"")||null);
    const diff = consReal !== null ? round2(consReal - teo) : null;
    const pct  = consReal !== null && teo ? round2((consReal-teo)/teo*100) : null;
    return { m, consReal, teo, invIni, entOdo, invFin, salFab, diff, pct };
  });

  const totalReal = kpiMats.reduce((s,k)=>s+(k.consReal||0),0);
  const totalTeo  = kpiMats.reduce((s,k)=>s+k.teo,0);
  const totalPct  = totalTeo ? ((totalReal-totalTeo)/totalTeo*100) : 0;
  const pendientes = kpiMats.filter(k=>k.consReal===null||k.consReal===0).length;
  const totalPiezas = TEORICO_RAW.filter(r => {
    const f = fechaISO(r["FECHA"]); if (!f || f < sem.inicio || f > sem.fin) return false;

    return true;

  let html = `
  <div class="metrics" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
    <div class="metric"><div class="metric-label">Semana</div><div class="metric-val" style="color:var(--text);font-size:15px">${sem.label}</div><div class="metric-sub">${sem.inicio} → ${sem.fin} · ${linLbl}</div></div>

    <div class="metric"><div class="metric-label">Teórico semana</div><div class="metric-val" style="color:#3b82f6">${fmtN(totalTeo)}<span style="font-size:12px"> kg</span></div><div class="metric-sub">calculado desde producción</div></div>
    <div class="metric"><div class="metric-label">Consumo Real (Teórico)</div><div class="metric-val" style="color:${pendientes>0?"var(--muted)":clrP(totalPct)}">${pendientes>0?"⏳ Sin inv.":fmtN(totalReal)+" kg"}</div><div class="metric-sub">${pendientes>0?"Captura inventario":fmtP(totalPct)+" vs teórico"}</div></div>

  // Tabla corte
  html += `<div class="card" style="margin-bottom:14px">

  // Tabla día a día
  const diasMap = {};

  // Formulario captura inventario
  const invInputStyle = `width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-size:12px;font-family:'Roboto Mono',monospace;text-align:right;outline:none;`;

  const lineasMostrar = LINEA ? [{ key:"L"+LINEA, label:"Línea "+LINEA, mats: matsL["L"+LINEA] }] :
    [["L1","Línea 1"],["L2","Línea 2"],["L3","Línea 3"],["L4","Línea 4"]].map(([k,l])=>({key:k,label:l,mats:matsL[k]}));

  const mId = m => m.replace(/[^a-zA-Z0-9]/g, '_');
  function invRows(pfx, mats) {
    return MATS.map(m => {
      const row = (mats||{})[m] || {};
      const ini = row["Inv. Inicial (kg)"] || "";

function recalcInvRow(pfx, mat) {
  const iniEl = document.getElementById(`inv_${pfx}_ini_${mat}`);
  const finEl = document.getElementById(`inv_${pfx}_fin_${mat}`);
  const el    = document.getElementById(`inv_${pfx}_cons_${mat}`);
  if (!el) return;
  const ini = parseFloat(iniEl?.value) || 0;
  const fin = parseFloat(finEl?.value) || 0;
  el.textContent = (iniEl?.value !== "" || finEl?.value !== "") ? fmtN(ini-fin) : "—";
}

// ── Guardar inventario via GAS ────────────────────────────────
async function guardarInventario(semana, fechaIni, fechaFin) {
  const MATS_INV = ["Gelcoat","Cat. Gelcoat","Resina","Cat. Resina","Marmolina"];
  const status = document.getElementById("inv-save-status");
  if (!GAS_INV_URL) {
    if (status) status.textContent = "⚠ GAS_INV_URL no configurado — revisar gas_inventarios_modular.gs";
    return;
  }
  if (status) status.textContent = "⏳ Guardando…";
  const mId = m => m.replace(/[^a-zA-Z0-9]/g, '_');
  const rows = [];
  ["L1","L2","L3","L4"].forEach(linea => {
    const pfx = linea.toLowerCase();
    MATS_INV.forEach(m => {
      const sid  = mId(m);
      const iniEl = document.getElementById(`inv_${pfx}_ini_${sid}`);
      const finEl = document.getElementById(`inv_${pfx}_fin_${sid}`);
      if (!iniEl && !finEl) return;
      const ini = iniEl?.value !== "" ? parseFloat(iniEl.value) : "";
      const fin = finEl?.value !== "" ? parseFloat(finEl.value) : "";
      if (ini === "" && fin === "") return;
      rows.push({ semana, fechaIni, fechaFin, material:m, linea, invIni:ini, invFin:fin });
    });
  });
  if (rows.length === 0) { if (status) status.textContent = "⚠ Sin datos para guardar"; return; }
  try {
    const res  = await fetch(GAS_INV_URL, { method:"POST", body: JSON.stringify({ action:"upsert_inv", rows }) });
    const data = await res.json();
    if (data.ok) {
      if (status) status.textContent = `✅ Guardado (${data.updated} registros) — ${new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})}`;
      await cargar();
    } else {
      if (status) status.textContent = `❌ Error: ${data.error}`;
    }
  } catch(e) {
    if (status) status.textContent = `❌ Error de red: ${e.message}`;
  }
}

// Clic en fila del historial → sube la fecha+línea al formulario y carga valores
function editarFisicoFila(fecha, linea) {
  const fechaEl = document.getElementById("fis-fecha");
  const lineaEl = document.getElementById("fis-linea");
  if (fechaEl) fechaEl.value = fecha;
  if (lineaEl) lineaEl.value = linea;
  cargarFisicoExistente();
  // Scroll suave al formulario
  fechaEl?.scrollIntoView({ behavior: "smooth", block: "center" });
}

// Auto-carga el registro existente al cambiar fecha o línea
function cargarFisicoExistente() {
  const fecha = document.getElementById("fis-fecha")?.value || "";
  const linea = document.getElementById("fis-linea")?.value || "";
  const badge = document.getElementById("fis-edit-badge");
  const ids   = {"Gelcoat":"gelcoat","GC Trans":"gel-trans","Cat. Gelcoat":"cat-gc","Resina":"resina","Cat. Resina":"cat-res","Titanio":"titanio","Marmolina":"marmolina"};
  const COLS  = {"Gelcoat":"Gelcoat (kg)","GC Trans":"Gel Coat Trans (kg)","Cat. Gelcoat":"Cat. Gelcoat (kg)","Resina":"Resina (kg)","Cat. Resina":"Cat. Resina (kg)","Titanio":"Titanio (kg)","Marmolina":"Marmolina (kg)"};

  if (!fecha || !linea) return;

  // Buscar registro existente en FISICO_RAW (mismo fecha+linea)
  const existe = FISICO_RAW.find(r =>
    String(r["Fecha"]||"").slice(0,10) === fecha &&
    (String(r["Linea"]||r["Línea"]||"").trim() === linea)
  );

  if (existe) {
    // Pre-llenar campos con valores existentes
    Object.entries(ids).forEach(([mat, id]) => {
      const el = document.getElementById(`fis-${id}`);
      if (el) el.value = parseFloat(existe[COLS[mat]]||0) || "";
    });
    const obsEl = document.getElementById("fis-obs");
    if (obsEl) obsEl.value = existe["Observaciones"] || "";
    if (badge) badge.style.display = "";
  } else {
    // Fecha nueva — limpiar campos
    Object.values(ids).forEach(id => {
      const el = document.getElementById(`fis-${id}`); if(el) el.value = "";
    });
    const obsEl = document.getElementById("fis-obs"); if(obsEl) obsEl.value = "";
    if (badge) badge.style.display = "none";
  }
}

async function guardarFisico() {
  const status = document.getElementById("fis-status");
  if (!GAS_INV_URL) { if(status) status.textContent="⚠ GAS_INV_URL no configurado"; return; }
  const fecha  = document.getElementById("fis-fecha")?.value || "";
  const linea  = document.getElementById("fis-linea")?.value || "";
  const obs    = document.getElementById("fis-obs")?.value   || "";
  if (!fecha || !linea) { if(status) status.textContent="⚠ Fecha y línea requeridas"; return; }
  const MATS_F = ["Gelcoat","GC Trans","Cat. Gelcoat","Resina","Cat. Resina","Titanio","Marmolina"];
  const ids    = {"Gelcoat":"gelcoat","GC Trans":"gel-trans","Cat. Gelcoat":"cat-gc","Resina":"resina","Cat. Resina":"cat-res","Titanio":"titanio","Marmolina":"marmolina"};
  // Mapear nombre del campo JS → nombre que espera el GAS
  const GAS_KEY = {"Gelcoat":"Gelcoat","GC Trans":"Gel Coat Trans","Cat. Gelcoat":"Cat. Gelcoat","Resina":"Resina","Cat. Resina":"Cat. Resina","Titanio":"Titanio","Marmolina":"Marmolina"};
  const vals = {};
  MATS_F.forEach(m => { vals[GAS_KEY[m]] = parseFloat(document.getElementById(`fis-${ids[m]}`)?.value||"") || 0; });

  // Verificar si es registro existente (permite guardar solo obs sin kg)
  const esExistente = !!FISICO_RAW.find(r =>
    String(r["Fecha"]||"").slice(0,10) === fecha &&
    String(r["Linea"]||r["Línea"]||"").trim() === linea
  );
  if (!esExistente && !Object.values(vals).some(v=>v>0)) {
    if(status) status.textContent="⚠ Ingresa al menos un valor"; return;
  }

  if(status) status.textContent="⏳ Guardando…";
  try {
    const res  = await fetch(GAS_INV_URL, { method:"POST", body: JSON.stringify({ action:"upsert_fisico", fecha, linea, obs, ...vals }) });
    const data = await res.json();
    if (data.ok) {
      if(status) status.textContent=`✅ ${esExistente?"Actualizado":"Guardado"} — ${new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})}`;
      MATS_F.forEach(m => { const el=document.getElementById(`fis-${ids[m]}`); if(el) el.value=""; });
      const obsEl=document.getElementById("fis-obs"); if(obsEl) obsEl.value="";
      const badge=document.getElementById("fis-edit-badge"); if(badge) badge.style.display="none";
      await cargar();
    } else { if(status) status.textContent=`❌ ${data.error}`; }
  } catch(e) { if(status) status.textContent=`❌ ${e.message}`; }
}

async function borrarFisicoMVT(fecha, linea) {
  if (!confirm(`¿Borrar el registro del ${fecha} — ${linea}?\nEsta acción no se puede deshacer.`)) return;
  try {
    const res  = await fetch(GAS_INV_URL, { method:"POST", body: JSON.stringify({ action:"delete_fisico", fecha, linea }) });
    const data = await res.json();
    if (data.ok) { await cargar(); }
    else alert("Error al borrar: " + data.error);
  } catch(e) { alert("Error: " + e.message); }
}

    REF_PESO_MAP = {};
    REF_PESO_RAW.forEach(r => {
      const cod  = String(r["CODIGO"] || "").trim();

// ── Peso de referencia por código de producto ─────────────────
// Devuelve {peso, gelcoat_sw, gel_trans, cat_gc, resina, cat_res, titanio, marmolina}
// Si no existe el código, calcula con factores (gelcoat_sw, gel_trans=0, titanio=0).
function getMatsRef(codigo, pesoFallback) {
  const ref = codigo ? REF_PESO_MAP[String(codigo).trim()] : null;
  if (ref && ref.peso > 0) return ref;
  // Fallback: factores genéricos (no hay transparente ni titanio en el fallback)
  const peso  = pesoFallback || 0;
  const gc    = round2(peso * F_GEL);
  const catGc = round2(gc * F_CAT);
  const resto = peso - gc - catGc;
  const res   = round2(resto * F_RES);
  return { peso, gelcoat_sw: gc, gel_trans: 0, cat_gc: catGc, resina: res,
           cat_res: round2(res * F_CAT), titanio: 0, marmolina: round2(resto * F_MAR) };
}

// Costo total de materiales de una pieza dado {gelcoat_sw,gel_trans,cat_gc,...} y mes
function costoPiezaMats(mats, am) {
  // gelcoat_sw y gel_trans usan el mismo precio (misma cat. Odoo GEL COAT)
  return round2(
    (mats.gelcoat_sw + mats.gel_trans) * getPrecioMes(am, 'gelcoat') +
    mats.cat_gc    * getPrecioMes(am, 'cat_gc') +
    mats.resina    * getPrecioMes(am, 'resina') +
    mats.cat_res   * getPrecioMes(am, 'cat_res') +
    mats.titanio   * getPrecioMes(am, 'titanio') +
    mats.marmolina * getPrecioMes(am, 'marmolina')
  );
}

// ── Precios: lookup por año-mes y material ────────────────────
// añoMes: 'YYYY-MM', matKey: 'gelcoat'|'cat_gc'|'resina'|'cat_res'|'marmolina'
// cat_res usa el mismo precio que cat_gc
function getPrecioMes(añoMes, matKey) {
  const DISP = {
    gelcoat   : 'Gel Coat',
    gel_trans : 'Gel Coat',        // mismo precio — misma categoría Odoo
    cat_gc    : 'Catalizador Gelcoat',
    cat_res   : 'Catalizador Gelcoat',
    resina    : 'Resina',
    titanio   : 'Bioxido de Titanio',
    marmolina : 'Marmolina Estens',
  };
  const displayName = DISP[matKey];
  if (!displayName) return 0;
  const candidatos = PRECIOS_RAW
    .filter(r => String(r["Material"] || "").trim() === displayName)
    .sort((a, b) => String(b["Año-Mes"] || "").localeCompare(String(a["Año-Mes"] || "")));
  if (!candidatos.length) return 0;
  const exacto = candidatos.find(r => String(r["Año-Mes"] || "").slice(0,7) === añoMes);
  if (exacto) return parseFloat(String(exacto["Precio USD/kg"] || "0").replace(",", ".")) || 0;
  const anterior = candidatos.find(r => String(r["Año-Mes"] || "").slice(0,7) <= añoMes);
  if (anterior) return parseFloat(String(anterior["Precio USD/kg"] || "0").replace(",", ".")) || 0;
  return parseFloat(String(candidatos[candidatos.length-1]["Precio USD/kg"] || "0").replace(",", ".")) || 0;
}

let _chartModelos = null;
function initChartModelos(datos) {
  const canvas = document.getElementById("chart-modelos");
  if (!canvas || !datos.length) return;
  if (_chartModelos) { _chartModelos.destroy(); _chartModelos = null; }

  const labels  = datos.map(d => d.desc);
  const costos  = datos.map(d => d.costoPza);
  const cantArr = datos.map(d => d.cant);
  const pesoArr = datos.map(d => d.pesoProm);
  const maxCosto = Math.max(...costos);

  // Color por rango de costo: verde→amarillo→rojo
  const colors = costos.map(c => {
    const pct = maxCosto > 0 ? c / maxCosto : 0;
    if (pct < 0.4) return 'rgba(34,197,94,0.75)';
    if (pct < 0.7) return 'rgba(245,158,11,0.75)';
    return 'rgba(59,130,246,0.75)';
  });

  _chartModelos = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Costo USD/pieza',
        data: costos,
        backgroundColor: colors,
        borderColor: colors.map(c => c.replace('0.75','1')),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const i = ctx.dataIndex;
              return [
                ` Costo: $${costos[i].toFixed(2)} USD/pza`,
                ` Cantidad: ${cantArr[i].toLocaleString()} piezas`,
                ` Peso prom: ${pesoArr[i].toFixed(2)} kg/pza`,
              ];
            }
          },
          backgroundColor: '#1e2535',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#e8eaf0',
          bodyColor: '#9ca3af',
          padding: 10,
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#6b7280', font: { family: 'Roboto Mono', size: 11 },
            callback: v => '$' + v.toFixed(2) },
          title: { display: true, text: 'USD / pieza', color: '#6b7280', font: { size: 11 } }
        },
        y: {

          ticks: { color: '#e8eaf0', font: { family: 'DM Sans', size: 11 }, maxTicksLimit: 30 }
        }
      }
    }
  });
}

// ── Costos ────────────────────────────────────────────────────
function renderCostos() {
  const _banner = `<div class="info-banner" style="background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);margin-bottom:14px">
    🚧 <strong>En construcción</strong> — módulo en desarrollo, los datos mostrados son preliminares.
  </div>`;
  const { desde, hasta } = getFechas();
  // Determine year range for prices (full year from fDesde year)
  const añoFiltro = desde ? desde.slice(0,4) : new Date().getFullYear().toString();

  // ── 0. Gráfica costo por modelo ───────────────────────────
  // Agrupar producción por modelo (descripción o ID_CONECT como fallback)
  const modelosMap = {};
  TEORICO_RAW.forEach(r => {
    if (!enPeriodo(r["FECHA"])) return;
    if ((r["ESTATUS"] || "") !== "Fabricado") return;
    const linNum = String(r["LINEA"] || "").replace(/[^0-9]/g, "").trim();
    if (LINEA && linNum !== LINEA) return;
    const peso = parseFloat(String(r["PESO"] || "0").replace(",", ".")) || 0;
    if (!peso) return;
    const cant = parseFloat(String(r["CANTIDAD"] || "1")) || 1;
    const fISO = fechaISO(r["FECHA"]); if (!fISO) return;
    const am   = fISO.slice(0, 7);
    const codigo = String(r["CODIGO"] || r["CODIGO_CORTO"] || r["CODE"] || "").trim();
    // Intentar múltiples nombres de columna para el modelo
    const desc = (String(r["DESCRIPCION"] || r["MODELO"] || r["DESCRIPCION_MODELO"] || r["DESCRIPCION_PRODUCTO"] || r["PRODUCTO"] || "").trim()) ||
                 String(r["ID_CONECT"] || "Sin modelo").trim();
    if (!modelosMap[desc]) modelosMap[desc] = { cant: 0, pesoTotal: 0, am, codigo };
    const d = modelosMap[desc];
    d.cant += cant;
    d.pesoTotal = round2(d.pesoTotal + peso * cant);
    d.am = am; // último mes visto para precio
    if (codigo && !d.codigo) d.codigo = codigo;
  });

  const modelosCost = Object.entries(modelosMap).map(([desc, d]) => {
    const am       = d.am;
    const pesoProm = d.cant > 0 ? d.pesoTotal / d.cant : 0;
    // Usar materiales de referencia exacta (gelcoat_sw + gel_trans) o factores
    const mats     = getMatsRef(d.codigo, pesoProm);
    const costoPza = costoPiezaMats(mats, am);
    return { desc, cant: d.cant, pesoProm: round2(pesoProm), costoPza,
             desdeRef: !!(d.codigo && REF_PESO_MAP[d.codigo]) };
  })
  .filter(m => m.cant > 0)
  .sort((a, b) => b.costoPza - a.costoPza);

  const chartH = Math.max(200, Math.min(modelosCost.length * 28 + 60, 520));
  const nConRef = modelosCost.filter(m => m.desdeRef).length;
  let graficaHtml = `<div class="card" style="margin-bottom:14px">
    <div class="card-title">Costo por Modelo
      <span>${modelosCost.length} modelos · ${nConRef} con peso exacto de catálogo · USD/pieza · mayor → menor</span>
    </div>
    ${modelosCost.length === 0
      ? `<div class="empty">Sin producción en el período — verifica las fechas o que haya precios cargados (sync_consumos_modular.py)</div>`
      : `<div style="position:relative;height:${chartH}px"><canvas id="chart-modelos"></canvas></div>
         <div style="margin-top:10px;max-height:280px;overflow-y:auto;overflow-x:auto;border:1px solid var(--border);border-radius:6px">
         <table style="min-width:500px"><thead><tr style="position:sticky;top:0;background:var(--bg3);z-index:1">
           <th>Modelo</th><th style="text-align:right">Piezas</th>
           <th style="text-align:right">Peso prom (kg)</th>
           <th style="text-align:right">Costo USD/pza</th>
           <th style="text-align:right">Total período USD</th>
           <th style="text-align:center" title="Peso tomado del catálogo REF_PESO_MVT">Ref.</th>
         </tr></thead><tbody>
         ${modelosCost.map(m => `<tr>
           <td style="font-size:12px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.desc}</td>
           <td class="mono" style="text-align:right">${m.cant.toLocaleString()}</td>
           <td class="mono" style="text-align:right;color:var(--muted)">${fmtN(m.pesoProm)}</td>
           <td class="mono" style="text-align:right;color:#22c55e;font-weight:600">${m.costoPza > 0 ? "$"+fmtN(m.costoPza) : "—"}</td>
           <td class="mono" style="text-align:right;color:var(--accent2)">${m.costoPza > 0 ? "$"+fmtN(round2(m.costoPza * m.cant)) : "—"}</td>
           <td style="text-align:center;font-size:11px">${m.desdeRef ? '<span style="color:var(--accent)" title="Catálogo">✓</span>' : '<span style="color:var(--muted)">~</span>'}</td>
         </tr>`).join("")}
         </tbody></table></div>`
    }
  </div>`;

  // ── 1. Tabla de precios por mes ───────────────────────────
  const mesesSet = new Set();
  PRECIOS_RAW.forEach(r => {
    const am = String(r["Año-Mes"] || "").slice(0,7);
    if (am && am.startsWith(añoFiltro)) mesesSet.add(am);
  });
  const mesesPrecio = Array.from(mesesSet).sort();

  const matCols = [
    { key: 'gelcoat',   label: 'Gel Coat $/kg',        color: '#3b82f6' },
    { key: 'cat_gc',    label: 'Cat. GC $/kg',          color: '#8b5cf6' },
    { key: 'resina',    label: 'Resina $/kg',           color: '#f59e0b' },
    { key: 'marmolina', label: 'Marmolina $/kg',        color: '#22c55e' },
  ];

  let preciosHtml = `<div class="card" style="margin-bottom:14px">
    <div class="card-title">Precios de Compra por Mes <span>${añoFiltro} · Promedio ponderado USD/kg</span></div>
    <div style="overflow-x:auto"><table style="min-width:500px"><thead><tr>
      <th>Mes</th>
      ${matCols.map(m => `<th style="text-align:right;color:${m.color}">${m.label}</th>`).join("")}
    </tr></thead><tbody>`;

  if (mesesPrecio.length === 0) {
    preciosHtml += `<tr><td colspan="${matCols.length+1}" class="empty">Sin datos en PRECIOS_MVT — ejecutar sync_consumos_modular.py</td></tr>`;
  } else {
    mesesPrecio.forEach(am => {
      const mes = new Date(am + "-15").toLocaleDateString("es-MX", { month: "short", year: "numeric" });
      preciosHtml += `<tr>
        <td class="mono">${mes}</td>
        ${matCols.map(m => {
          const p = getPrecioMes(am, m.key);
          return `<td class="mono" style="text-align:right;color:${p > 0 ? m.color : "var(--muted)"}">${p > 0 ? "$" + p.toFixed(4) : "—"}</td>`;
        }).join("")}
      </tr>`;
    });
  }
  preciosHtml += `</tbody></table></div></div>`;

  // ── 2. Costo de producción teórico por mes ────────────────
  // Agrupar TEORICO_RAW fabricados en el rango por mes
  const prodMeses = {}; // { 'YYYY-MM': { piezas, gcSw, gcTrans, catGc, res, catRes, tit, mar } }
  TEORICO_RAW.forEach(r => {
    if (!enPeriodo(r["FECHA"])) return;
    if ((r["ESTATUS"] || "") !== "Fabricado") return;
    const linNum = String(r["LINEA"] || "").replace(/[^0-9]/g, "").trim();
    if (LINEA && linNum !== LINEA) return;
    const peso = parseFloat(String(r["PESO"] || "0").replace(",", ".")) || 0;
    if (!peso) return;
    const cant   = parseFloat(String(r["CANTIDAD"] || "1")) || 1;
    const codigo = String(r["CODIGO"] || r["CODIGO_CORTO"] || r["CODE"] || "").trim();
    const mats   = getMatsRef(codigo, peso);
    const fISO   = fechaISO(r["FECHA"]); if (!fISO) return;
    const am = fISO.slice(0,7);
    if (!prodMeses[am]) prodMeses[am] = { piezas:0, gcSw:0, gcTrans:0, catGc:0, res:0, catRes:0, tit:0, mar:0 };
    const d = prodMeses[am];
    d.piezas  += cant;
    d.gcSw    = round2(d.gcSw   + mats.gelcoat_sw * cant);
    d.gcTrans = round2(d.gcTrans+ mats.gel_trans   * cant);
    d.catGc   = round2(d.catGc  + mats.cat_gc      * cant);
    d.res     = round2(d.res    + mats.resina       * cant);
    d.catRes  = round2(d.catRes + mats.cat_res      * cant);
    d.tit     = round2(d.tit    + (mats.titanio||0) * cant);
    d.mar     = round2(d.mar    + mats.marmolina    * cant);
  });

  const prodMesesList = Object.keys(prodMeses).sort();

  let costoProdHtml = `<div class="card" style="margin-bottom:14px">
    <div class="card-title">Costo de Producción Teórico por Mes <span>USD · desde precio promedio ponderado</span></div>
    <div style="overflow-x:auto"><table style="min-width:920px"><thead><tr>
      <th>Mes</th>
      <th style="text-align:right">Piezas</th>
      <th style="text-align:right;color:#3b82f6">GC Sólido $/pza</th>
      <th style="text-align:right;color:#38bdf8">GC Trans $/pza</th>
      <th style="text-align:right;color:#8b5cf6">Cat.GC $/pza</th>
      <th style="text-align:right;color:#f59e0b">Resina $/pza</th>
      <th style="text-align:right;color:#f97316">Titanio $/pza</th>
      <th style="text-align:right;color:#22c55e">Marmolina $/pza</th>
      <th style="text-align:right">Total $/pza</th>
      <th style="text-align:right">Total $ Mes</th>
    </tr></thead><tbody>`;

  if (prodMesesList.length === 0) {
    costoProdHtml += `<tr><td colspan="10" class="empty">Sin producción en el período seleccionado</td></tr>`;
  } else {
    let totPiezas=0, totMes=0;
    prodMesesList.forEach(am => {
      const d = prodMeses[am];
      if (!d.piezas) return;
      const pgc  = getPrecioMes(am, 'gelcoat');
      const pcgc = getPrecioMes(am, 'cat_gc');
      const pres = getPrecioMes(am, 'resina');
      const pmar = getPrecioMes(am, 'marmolina');
      const pcres= getPrecioMes(am, 'cat_res');
      const ptit = getPrecioMes(am, 'titanio');
      const gcSwPza  = round2((d.gcSw    / d.piezas) * pgc);
      const gcTrPza  = round2((d.gcTrans / d.piezas) * pgc);
      const cgcPza   = round2((d.catGc   / d.piezas) * pcgc);
      const resPza   = round2((d.res     / d.piezas) * pres);
      const cresPza  = round2((d.catRes  / d.piezas) * pcres);
      const titPza   = round2((d.tit     / d.piezas) * ptit);
      const marPza   = round2((d.mar     / d.piezas) * pmar);
      const totPza   = round2(gcSwPza + gcTrPza + cgcPza + resPza + cresPza + titPza + marPza);
      const totalMes = round2(totPza * d.piezas);
      totPiezas += d.piezas;
      totMes = round2(totMes + totalMes);
      const mes = new Date(am + "-15").toLocaleDateString("es-MX", { month: "short", year: "numeric" });
      const hasPrices = pgc > 0 || pres > 0 || pmar > 0;
      costoProdHtml += `<tr>
        <td class="mono">${mes}</td>
        <td class="mono" style="text-align:right">${d.piezas.toLocaleString()}</td>
        <td class="mono" style="text-align:right;color:${hasPrices?"#3b82f6":"var(--muted)"}">${gcSwPza > 0 ? "$"+fmtN(gcSwPza) : "—"}</td>
        <td class="mono" style="text-align:right;color:${hasPrices?"#38bdf8":"var(--muted)"}">${gcTrPza > 0 ? "$"+fmtN(gcTrPza) : "—"}</td>
        <td class="mono" style="text-align:right;color:${hasPrices?"#8b5cf6":"var(--muted)"}">${cgcPza > 0 ? "$"+fmtN(cgcPza) : "—"}</td>
        <td class="mono" style="text-align:right;color:${hasPrices?"#f59e0b":"var(--muted)"}">${resPza > 0 ? "$"+fmtN(resPza) : "—"}</td>
        <td class="mono" style="text-align:right;color:${hasPrices?"#f97316":"var(--muted)"}">${titPza > 0 ? "$"+fmtN(titPza) : "—"}</td>
        <td class="mono" style="text-align:right;color:${hasPrices?"#22c55e":"var(--muted)"}">${marPza > 0 ? "$"+fmtN(marPza) : "—"}</td>
        <td class="mono" style="text-align:right;font-weight:600">${totPza > 0 ? "$"+fmtN(totPza) : "—"}</td>
        <td class="mono" style="text-align:right;font-weight:600;color:var(--accent)">${totalMes > 0 ? "$"+fmtN(totalMes) : "—"}</td>
      </tr>`;
    });
    costoProdHtml += `<tr style="font-weight:700;border-top:2px solid var(--border);background:rgba(255,255,255,.03)">
      <td>TOTAL</td>
      <td class="mono" style="text-align:right">${totPiezas.toLocaleString()}</td>
      <td colspan="7"></td>
      <td class="mono" style="text-align:right;color:var(--accent)">$${fmtN(totMes)}</td>
    </tr>`;
  }
  costoProdHtml += `</tbody></table></div></div>`;

  // ── 3. Costo Grado C ──────────────────────────────────────
  const gradocFilt = GRADOC_RAW.filter(r => enPeriodo(r["Fecha"]));
  // Calcular costo total por mes
  const gcMeses = {};
  gradocFilt.forEach(r => {
    const am = String(r["Fecha"] || "").slice(0,7);
    if (!am) return;
    const peso = parseFloat(String(r["Peso Total (kg)"] || "0").replace(",", ".")) || 0;
    const cant = parseFloat(String(r["Cantidad"] || "1").replace(",", ".")) || 1;
    // Descomponer peso en materiales usando los factores
    const gc    = round2(peso * F_GEL);
    const catGc = round2(gc * F_CAT);
    const resto = peso - gc - catGc;
    const res   = round2(resto * F_RES);
    const catRes= round2(res * F_CAT);
    const mar   = round2(resto * F_MAR);
    const pgc   = getPrecioMes(am, 'gelcoat');
    const pcgc  = getPrecioMes(am, 'cat_gc');
    const pres  = getPrecioMes(am, 'resina');
    const pcres = getPrecioMes(am, 'cat_res');
    const pmar  = getPrecioMes(am, 'marmolina');
    const costo = round2(gc*pgc + catGc*pcgc + res*pres + catRes*pcres + mar*pmar);
    if (!gcMeses[am]) gcMeses[am] = { piezas: 0, pesoKg: 0, costoUSD: 0 };
    gcMeses[am].piezas += cant;
    gcMeses[am].pesoKg = round2(gcMeses[am].pesoKg + peso);
    gcMeses[am].costoUSD = round2(gcMeses[am].costoUSD + costo);
  });

  const totGcPiezas = Object.values(gcMeses).reduce((s,v)=>s+v.piezas,0);
  const totGcKg = round2(Object.values(gcMeses).reduce((s,v)=>s+v.pesoKg,0));
  const totGcCosto = round2(Object.values(gcMeses).reduce((s,v)=>s+v.costoUSD,0));

  let gradocHtml = `<div class="card" style="margin-bottom:14px">
    <div class="card-title">Grado C <span>piezas rechazadas con costo de material</span></div>
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <div class="metric"><div class="metric-label">Piezas Grado C</div><div class="metric-val" style="color:var(--danger)">${totGcPiezas.toLocaleString()}</div><div class="metric-sub">en el período</div></div>
      <div class="metric"><div class="metric-label">Peso total kg</div><div class="metric-val" style="color:var(--warn)">${fmtN(totGcKg)}</div><div class="metric-sub">material perdido</div></div>
      <div class="metric"><div class="metric-label">Costo USD</div><div class="metric-val" style="color:var(--danger)">${totGcCosto > 0 ? "$"+fmtN(totGcCosto) : "—"}</div><div class="metric-sub">${totGcCosto===0?"sin precios cargados":"costo materia prima"}</div></div>
    </div>`;

  const gcMesesList = Object.keys(gcMeses).sort();
  if (gcMesesList.length > 0) {
    gradocHtml += `<div style="overflow-x:auto"><table><thead><tr>
      <th>Mes</th>
      <th style="text-align:right">Piezas GC</th>
      <th style="text-align:right">Peso kg</th>
      <th style="text-align:right">Costo USD</th>
    </tr></thead><tbody>`;
    gcMesesList.forEach(am => {
      const d = gcMeses[am];
      const mes = new Date(am + "-15").toLocaleDateString("es-MX", { month: "short", year: "numeric" });
      gradocHtml += `<tr>
        <td class="mono">${mes}</td>
        <td class="mono" style="text-align:right;color:var(--danger)">${d.piezas.toLocaleString()}</td>
        <td class="mono" style="text-align:right;color:var(--warn)">${fmtN(d.pesoKg)}</td>
        <td class="mono" style="text-align:right;color:var(--danger)">${d.costoUSD > 0 ? "$"+fmtN(d.costoUSD) : "—"}</td>
      </tr>`;
    });
    gradocHtml += `</tbody></table></div>`;
  } else {
    gradocHtml += `<div class="empty">Sin registros Grado C en el período — ejecutar sync_consumos_modular.py</div>`;
  }
  gradocHtml += `</div>`;

  // ── 4. Costo Merma ────────────────────────────────────────
  const mermaFilt = MERMA_RAW.filter(r => enPeriodo(r["Fecha"]));
  const mermaMeses = {};
  mermaFilt.forEach(r => {
    const am = String(r["Fecha"] || "").slice(0,7);
    if (!am) return;
    const kg = parseFloat(String(r["kg Merma"] || "0").replace(",",".")) || 0;
    if (!mermaMeses[am]) mermaMeses[am] = { kg: 0 };
    mermaMeses[am].kg = round2(mermaMeses[am].kg + kg);
  });

  const totMermaKg = round2(Object.values(mermaMeses).reduce((s,v)=>s+v.kg,0));

  let mermaHtml = `<div class="card" style="margin-bottom:14px">
    <div class="card-title">Merma <span>material descartado en producción — captura en pestaña Físico</span></div>
    <div class="metrics" style="grid-template-columns:1fr;margin-bottom:14px">
      <div class="metric"><div class="metric-label">Total Merma</div><div class="metric-val" style="color:var(--warn)">${fmtN(totMermaKg)} kg</div><div class="metric-sub">en el período</div></div>
    </div>`;

  const mermaMesesList = Object.keys(mermaMeses).sort();
  if (mermaMesesList.length > 0) {
    mermaHtml += `<div style="overflow-x:auto"><table><thead><tr>
      <th>Mes</th><th style="text-align:right">Merma (kg)</th>
    </tr></thead><tbody>`;
    mermaMesesList.forEach(am => {
      const d = mermaMeses[am];
      const mes = new Date(am + "-15").toLocaleDateString("es-MX", { month: "short", year: "numeric" });
      mermaHtml += `<tr>
        <td class="mono">${mes}</td>
        <td class="mono" style="text-align:right;color:var(--warn)">${fmtN(d.kg)}</td>
      </tr>`;
    });
    mermaHtml += `</tbody></table></div>`;
  } else {
    mermaHtml += `<div class="empty">Sin registros de merma en el período — captura en pestaña Físico</div>`;
  }
  mermaHtml += `</div>`;

  document.getElementById("main-content").innerHTML =
    _banner + graficaHtml + preciosHtml + costoProdHtml + gradocHtml + mermaHtml;
  setTimeout(() => initChartModelos(modelosCost), 0);
}

async function guardarMerma() {
  const status = document.getElementById("mer-status");
  if (!GAS_INV_URL) { if(status) status.textContent="⚠ GAS_INV_URL no configurado"; return; }
  const fecha = document.getElementById("mer-fecha")?.value || "";
  const linea = document.getElementById("mer-linea")?.value || "";
  const obs   = document.getElementById("mer-obs")?.value   || "";
  const kg    = parseFloat(document.getElementById("mer-kg")?.value || "") || 0;
  if (!fecha || !linea) { if(status) status.textContent="⚠ Fecha y línea requeridas"; return; }
  if (!kg) { if(status) status.textContent="⚠ Ingresa los kg de merma"; return; }
  if(status) status.textContent="⏳ Guardando…";
  try {
    const res  = await fetch(GAS_INV_URL, { method:"POST", body: JSON.stringify({ action:"upsert_merma", fecha, linea, kg, obs }) });
    const data = await res.json();
    if (data.ok) {
      if(status) status.textContent=`✅ Guardado — ${new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})}`;
      const el = document.getElementById("mer-kg"); if(el) el.value="";
      const eo = document.getElementById("mer-obs"); if(eo) eo.value="";
      await cargar();
    } else { if(status) status.textContent=`❌ ${data.error}`; }
  } catch(e) { if(status) status.textContent=`❌ ${e.message}`; }
}

// ── Inicializar ───────────────────────────────────────────────
