<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535;
  --border: rgba(255,255,255,0.07); --text: #e8eaf0; --muted: #6b7280;
  --accent: #22c55e; --accent2: #3b82f6; --warn: #f59e0b; --danger: #ef4444; --info: #8b5cf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100;
}
.logo { padding: 20px 20px 12px; font-size: 13px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; }
.logo svg { width: 18px; height: 18px; }
.logo-sub { font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 1px; }
.nav-group { padding: 0 8px; margin-bottom: 4px; }
.nav-label { font-size: 10px; color: var(--muted); padding: 8px 12px 4px; letter-spacing: 0.8px; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(34,197,94,0.1); color: var(--accent); border-color: rgba(34,197,94,0.2); }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.emp-selector { margin: 0 12px 12px; }
.emp-selector label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.emp-selector select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: 'DM Sans',sans-serif; font-size: 12px; outline: none; cursor: pointer; }
.sidebar-bottom { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
.user-badge { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; background: var(--bg3); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #000; flex-shrink: 0; }
.user-name { font-size: 12px; font-weight: 500; }
.user-role { font-size: 10px; color: var(--muted); }
.main { margin-left: 220px; min-height: 100vh; }
.topbar { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 15px; font-weight: 600; }
.topbar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.pill-green { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
.pill-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
.pill-gray { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.btn { font-size: 12px; padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Sans',sans-serif; transition: all 0.15s; }
.btn:hover { background: var(--bg); border-color: rgba(255,255,255,0.15); }
.btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-accent:hover { background: #16a34a; }
.content { padding: 20px 24px; }
.metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
.metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.metric-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-val { font-size: 26px; font-weight: 600; line-height: 1; }
.metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.green { color: var(--accent); } .amber { color: var(--warn); } .red { color: var(--danger); } .blue { color: var(--accent2); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
.card-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.card-title span { color: var(--muted); font-size: 11px; font-weight: 400; }
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
.table-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.table-header-title { font-size: 13px; font-weight: 600; }
table { width: 100%; border-collapse: collapse; }
th { padding: 8px 12px; text-align: left; font-size: 10px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px 12px; font-size: 12px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.mono { font-family: 'DM Mono',monospace; font-size: 11px; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
.b-normal { background: rgba(34,197,94,0.15); color: #4ade80; }
.b-retardo { background: rgba(245,158,11,0.15); color: #fbbf24; }
.b-extra { background: rgba(59,130,246,0.15); color: #60a5fa; }
.b-retardo-extra { background: rgba(139,92,246,0.15); color: #a78bfa; }
.b-incompleto { background: rgba(239,68,68,0.15); color: #f87171; }
.b-ausente { background: rgba(239,68,68,0.2); color: #ef4444; }
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.bar-label { width: 110px; color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex-shrink: 0; font-size: 11px; }
.bar-track { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.bar-val { width: 30px; text-align: right; font-family: 'DM Mono',monospace; font-size: 11px; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 12px; color: var(--muted); }
.spinner { width: 24px; height: 24px; border: 2px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-green { background: var(--accent); } .dot-red { background: var(--danger); } .dot-amber { background: var(--warn); }
input[type=date], input[type=text], select.filter {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; color: var(--text); font-family: 'DM Sans',sans-serif;
  font-size: 12px; outline: none;
}
input[type=text] { flex: 1; min-width: 160px; }
.filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.resumen-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; padding: 4px 0; }
.resumen-dot { display: flex; align-items: center; gap: 6px; color: var(--muted); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <div><div>Asistencia</div><div class="logo-sub">Control de personal</div></div>
  </div>

  <div class="emp-selector">
    <label>Empresa</label>
    <select id="emp-select" onchange="cambiarEmpresa(this.value)">
      <option value="woods">Modul Woods</option>
      <option value="shower">Shower Walls</option>
      <option value="modular">Modular</option>
      <option value="kuartz">Kuartz</option>
    </select>
  </div>

  <div class="nav-group">
    <div class="nav-label">Principal</div>
    <div class="nav-item active" id="nav-dashboard" onclick="navegar('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </div>
    <div class="nav-item" id="nav-registros" onclick="navegar('registros',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Registros
    </div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Reportes</div>
    <div class="nav-item" id="nav-areas" onclick="navegar('areas',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>

    </div>
    <div class="nav-item" id="nav-empleados" onclick="navegar('empleados',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Empleados
    </div>
    <div class="nav-item" id="nav-semana" onclick="navegar('semana',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

    </div>
    <div class="nav-item" id="nav-nomina" onclick="navegar('nomina',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Nómina
    </div>
  </div>

  <div class="nav-group">
    <div class="nav-label">Gestión</div>
    <div class="nav-item" id="nav-alta" onclick="navegar('alta',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>

  <div class="sidebar-bottom">
    <div class="user-badge">
      <div class="user-avatar">RH</div>
      <div><div class="user-name">RH / Nóminas</div><div class="user-role">Acceso completo</div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-sub" id="page-sub">Cargando...</div>
    </div>
    <div class="topbar-right">
      <div class="pill pill-gray" id="status-pill"><span class="dot dot-amber"></span> Cargando...</div>
      <button class="btn" onclick="cargarDatos()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Actualizar
      </button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><div>Conectando...</div></div>
  </div>
</div>

<script>
const API_KEY         = "AIzaSyD2fUvrz6Mtl9eHP4tnVwEth76dBgeWIC0";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyq-UhXFJzM-QVuP8iGEnJcn-M5pByZrGognQ1yvA6mhI9K8Z9XXtNyidQDGSLnBPtS/exec";

const EMPRESAS = {
  woods: {
    nombre: "Modul Woods",
    sheets_id: "1vTk8M_rI3k9pXo18rsY9mF4QSj1SuBdR9eTsrPCL8xw",
    hoja: "REGISTROS"
  },
  shower: {
    nombre: "Shower Walls",
    sheets_id: "1H-WerDj1GFafoaqsEk7Xmjt_KAi-fwG4tMkiV1B_XUo",
    hoja: "REGISTROS"
  },
  modular: {
    nombre: "Modular",
    sheets_id: "1cL2rzLR0eJ4zsyimFO9sPqACx6iWF4cCwI06yrI7j4Y",
    hoja: "REGISTROS"
  },
  kuartz: {
    nombre: "Kuartz",
    sheets_id: "1LTSojdgzOcDI5zqRHzQf5FQbt4zyRk_500QZLhNjKEg",
    hoja: "REGISTROS"
  }
};

let empresaActual    = "woods";
let paginaActual     = "dashboard";
let datos            = null;
let datosEmpleados   = null;
let filtroSubEmpresa = "";
let fechaHoy         = new Date().toISOString().split("T")[0];

function navegar(page, el) {
  paginaActual = page;
  document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  const titulos = { dashboard:"Dashboard", registros:"Registros", areas:"Reporte por área", empleados:"Empleados", semana:"Grid Semanal", nomina:"Reporte de Nómina", alta:"Alta de Empleado" };
  document.getElementById("page-title").textContent = titulos[page];
  renderPagina();
}

function cambiarEmpresa(val) {
  empresaActual    = val;
  datos            = null;
  datosEmpleados   = null;
  cargarDatos();
}

async function cargarDatos() {
  const emp = EMPRESAS[empresaActual];
  document.getElementById("content").innerHTML = `<div class="loading"><div class="spinner"></div><div>Cargando ${emp.nombre}...</div></div>`;
  document.getElementById("status-pill").innerHTML = `<span class="dot dot-amber"></span> Cargando...`;
  document.getElementById("status-pill").className = "pill pill-gray";

  try {
    // Cargar REGISTROS
    const urlReg = `https://sheets.googleapis.com/v4/spreadsheets/${emp.sheets_id}/values/${encodeURIComponent("REGISTROS")}?key=${API_KEY}`;
    const r = await fetch(urlReg);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const filas = d.values || [];
    if (filas.length < 2) throw new Error("Sin datos");
    const headers = filas[0];
    datos = filas.slice(1).map(f => {
      const o = {};
      headers.forEach((h,i) => o[h.trim()] = (f[i]||"").trim());
      return o;
    });

    // Cargar EMPLEADOS
    try {
      const urlEmp = `https://sheets.googleapis.com/v4/spreadsheets/${emp.sheets_id}/values/${encodeURIComponent("EMPLEADOS")}?key=${API_KEY}`;
      const re = await fetch(urlEmp);
      if (re.ok) {
        const de = await re.json();
        const filasE = de.values || [];
        if (filasE.length >= 2) {
          const headersE = filasE[0];
          datosEmpleados = filasE.slice(1).map(f => {
            const o = {};
            headersE.forEach((h,i) => o[h.trim()] = (f[i]||"").trim());
            return o;
          });
        }
      }
    } catch(e2) { datosEmpleados = null; }

    document.getElementById("status-pill").innerHTML = `<span class="dot dot-green"></span> ${datos.length} registros`;
    document.getElementById("status-pill").className = "pill pill-green";
    const ahora = new Date();
    document.getElementById("page-sub").textContent = `${emp.nombre} · ${ahora.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}`;
    renderPagina();
  } catch(e) {
    document.getElementById("status-pill").innerHTML = `<span class="dot dot-red"></span> Error`;
    document.getElementById("status-pill").className = "pill pill-red";
    document.getElementById("content").innerHTML = `<div class="loading"><div style="color:var(--danger);font-size:28px">⚠</div><div>${e.message}</div></div>`;
  }
}

function renderPagina() {
  if (!datos) { cargarDatos(); return; }
  if (paginaActual === "dashboard")       renderDashboard();
  else if (paginaActual === "registros")  renderRegistros();
  else if (paginaActual === "areas")      renderAreas();
  else if (paginaActual === "empleados")  renderEmpleados();
  else if (paginaActual === "semana")     renderSemana();
  else if (paginaActual === "nomina")     renderNomina();
  else if (paginaActual === "alta")       renderAltaEmpleado();
}

// Helpers — búsqueda de columnas insensible a mayúsculas
function g(r, ...keys) {
  for (const k of keys) {
    // Buscar exacto primero
    if (r[k] && r[k] !== "—" && r[k] !== "-") return r[k];
    // Buscar insensible a mayúsculas
    const kl = k.toLowerCase();
    for (const rk of Object.keys(r)) {
      if (rk.toLowerCase() === kl && r[rk] && r[rk] !== "—" && r[rk] !== "-") return r[rk];
    }
  }
  return "";
}
function parseHoras(val) {
  if (!val || val === "—" || val === "-") return 0;
  const s = String(val);
  if (s.includes(":")) { const [h,m] = s.split(":").map(Number); return h + (m||0)/60; }
  return parseFloat(s) || 0;
}
function parseRetardo(val) {
  if (!val || val === "—" || val === "-") return 0;
  const s = String(val);
  if (s.includes(":")) { const [h,m] = s.split(":").map(Number); return h*60 + (m||0); }
  return parseInt(s) || 0;
}
function toMins(t) { if (!t || t==="—") return 0; const [h,m] = String(t).split(":").map(Number); return h*60+(m||0); }
function calcHoras(r) {
  let stored = parseHoras(g(r,"horas_trabajadas","HorasTrabajadas"));
  if (stored > 0) {
    // Si el valor guardado es > 24 está en minutos, convertir a horas
    if (stored > 24) stored = stored / 60;
    return stored;
  }
  const ent = g(r,"entrada_real","EntradaReal");
  const sal = g(r,"salida_real","SalidaFinalReal");
  if (!ent || !sal) return 0;
  let mins = toMins(sal) - toMins(ent);
  const ic = g(r,"inicio_comer"); const rc = g(r,"regreso_comer");
  if (ic && rc) mins -= (toMins(rc) - toMins(ic));
  return Math.max(0, mins/60);
}
function estadoBadge(e) {
  const m = {"NORMAL":"b-normal","RETARDO":"b-retardo","EXTRA":"b-extra","RETARDO CON EXTRA":"b-retardo-extra","INCOMPLETO":"b-incompleto","AUSENTE":"b-ausente"};
  return `<span class="badge ${m[e]||'b-incompleto'}">${e||'—'}</span>`;
}
function filtrarRango(desde, hasta) {
  return datos.filter(r => {
    const f = g(r,"fecha","Fecha");
    if (f < desde || f > hasta) return false;
    if (filtroSubEmpresa && g(r,"empresa") !== filtroSubEmpresa) return false;
    return true;
  });
}
function filtrarFecha(f) {
  return datos.filter(r => {
    if (g(r,"fecha","Fecha") !== f) return false;
    if (filtroSubEmpresa && g(r,"empresa") !== filtroSubEmpresa) return false;
    return true;
  });
}
function getSubEmpresas() {
  if (!datos) return [];
  return [...new Set(datos.map(r => g(r,"empresa")).filter(Boolean))].sort();
}
function selectSubEmpresa(id) {
  const subs = getSubEmpresas();
  if (subs.length <= 1) return "";  // Solo hay una empresa, no mostrar filtro
  return `<select class="filter" id="${id}" onchange="filtroSubEmpresa=this.value;renderPagina()">
    <option value="">Todas las empresas</option>
    ${subs.map(s=>`<option value="${s}" ${filtroSubEmpresa===s?"selected":""}>${s}</option>`).join("")}
  </select>`;
}

// ─── DASHBOARD ───────────────────────────────────────────────
function renderDashboard() {
  const dDesde = document.getElementById("d-desde")?.value || fechaHoy;
  const dHasta = document.getElementById("d-hasta")?.value || fechaHoy;
  const esRango = dDesde !== dHasta;
  const hoy   = filtrarRango(dDesde, dHasta);
  const total = hoy.length;
  const norm  = hoy.filter(r => g(r,"estado","EstadoAsistencia") === "NORMAL").length;
  const ret   = hoy.filter(r => g(r,"estado","EstadoAsistencia").includes("RETARDO")).length;
  const inc   = hoy.filter(r => ["INCOMPLETO","AUSENTE"].includes(g(r,"estado","EstadoAsistencia"))).length;
  const ext   = hoy.filter(r => g(r,"estado","EstadoAsistencia") === "EXTRA").length;
  const retExt= hoy.filter(r => g(r,"estado","EstadoAsistencia") === "RETARDO CON EXTRA").length;

  // promedio horas trabajadas
  const conHoras = hoy.filter(r => calcHoras(r) > 0);
  const promHoras = conHoras.length ? (conHoras.reduce((s,r) => s + calcHoras(r), 0) / conHoras.length).toFixed(2) : "0.00";

  // por área
  const porArea = {};
  hoy.forEach(r => {
    const a = g(r,"area","Departamento") || "Sin área";
    if (!porArea[a]) porArea[a] = {total:0,ok:0};
    porArea[a].total++;
    if (g(r,"estado","EstadoAsistencia") === "NORMAL") porArea[a].ok++;
  });
  const areasTop = Object.entries(porArea).sort((a,b)=>b[1].total-a[1].total).slice(0,7);
  const maxA = areasTop.reduce((m,[,v])=>Math.max(m,v.total),1);

  const ultimos = [...hoy].reverse().slice(0,8);

  document.getElementById("content").innerHTML = `
    <div class="filters">
      <label style="font-size:11px;color:var(--muted);align-self:center">Desde</label>
      <input type="date" id="d-desde" value="${dDesde}" onchange="renderDashboard()">
      <label style="font-size:11px;color:var(--muted);align-self:center">Hasta</label>
      <input type="date" id="d-hasta" value="${dHasta}" onchange="renderDashboard()">
      <button class="btn" onclick="document.getElementById('d-desde').value=fechaHoy;document.getElementById('d-hasta').value=fechaHoy;renderDashboard()">Hoy</button>
      ${selectSubEmpresa("d-subemp")}
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Presentes${esRango?' (rango)':' hoy'}</div><div class="metric-val green">${total}</div><div class="metric-sub">registros del día</div></div>
      <div class="metric"><div class="metric-label">Normales</div><div class="metric-val blue">${norm}</div><div class="metric-sub">${total?Math.round(norm/total*100):0}% del total</div></div>
      <div class="metric"><div class="metric-label">Retardos</div><div class="metric-val amber">${ret + retExt}</div><div class="metric-sub">llegadas tarde</div></div>
      <div class="metric"><div class="metric-label">Prom. horas</div><div class="metric-val">${promHoras}</div><div class="metric-sub">hrs trabajadas</div></div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">Asistencia por área <span>${dDesde === dHasta ? dDesde : dDesde+' → '+dHasta}</span></div>
        <div class="bar-chart">
          ${areasTop.map(([a,v])=>`
            <div class="bar-row">
              <div class="bar-label" title="${a}">${a}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v.total/maxA*100)}%;background:${v.ok/v.total>0.8?'var(--accent)':v.ok/v.total>0.5?'var(--warn)':'var(--danger)'}"></div></div>
              <div class="bar-val">${v.total}</div>
            </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="card-title">Resumen del día</div>
        ${[["Normal",norm,"var(--accent)"],["Extra",ext,"var(--accent2)"],["Retardo",ret,"var(--warn)"],["Retardo con extra",retExt,"#a78bfa"],["Incompleto",inc,"var(--danger)"]].map(([l,v,c])=>`
          <div class="resumen-row">
            <div class="resumen-dot"><div class="dot" style="background:${c}"></div><span style="color:var(--muted)">${l}</span></div>
            <span class="mono" style="color:${c}">${v}</span>
          </div>`).join("")}
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header"><div class="table-header-title">Últimos registros — ${dDesde === dHasta ? dDesde : dDesde+' → '+dHasta}</div><div style="font-size:11px;color:var(--muted)">${total} empleados</div></div>
      <table><thead><tr>
        <th>Nómina</th><th>Empleado</th><th>Área</th><th>Entrada</th><th>Salida</th><th>Hrs</th><th>Retardo</th><th>Estado</th>
      </tr></thead><tbody>
        ${ultimos.map(r=>`<tr>
          <td class="mono" style="color:var(--muted)">${g(r,"nomina","NOMINA")}</td>
          <td style="font-weight:500">${g(r,"nombre","Nombre")} ${g(r,"apellido","Apellido")}</td>
          <td style="color:var(--muted);font-size:11px">${g(r,"area","Departamento")}</td>
          <td class="mono">${g(r,"entrada_real","EntradaReal")||"—"}</td>
          <td class="mono">${g(r,"salida_real","SalidaFinalReal")||"—"}</td>
          <td class="mono">${calcHoras(r).toFixed(2)}</td>
          <td class="mono" style="color:${parseRetardo(g(r,"minutos_retardo","MinutosRetardo"))>0?'var(--warn)':'var(--muted)'}">${parseRetardo(g(r,"minutos_retardo","MinutosRetardo"))} min</td>
          <td>${estadoBadge(g(r,"estado","EstadoAsistencia"))}</td>
        </tr>`).join("")}
      </tbody></table>
    </div>`;
}

let areaOpen = null;
function renderAreas() {
  const aDesde = document.getElementById("a-desde")?.value || fechaHoy;
  const aHasta = document.getElementById("a-hasta")?.value || fechaHoy;
  const dd    = filtrarRango(aDesde, aHasta);

  // Total de empleados por área desde el catálogo (para el denominador)
  const totalPorArea = {};
  if (datosEmpleados) {
    datosEmpleados.forEach(e => {
      const area = (e.area || e.AREA || "").trim() || "Sin área";
      const emp  = (e.empresa || e.EMPRESA || "").trim();
      if (filtroSubEmpresa && emp && emp !== filtroSubEmpresa) return;
      if (!totalPorArea[area]) totalPorArea[area] = 0;
      totalPorArea[area]++;
    });
  }

  const porArea = {};
  dd.forEach(r => {
    const a   = g(r,"area","Departamento") || "Sin área";
    const est = g(r,"estado","EstadoAsistencia");
    const ret = parseRetardo(g(r,"minutos_retardo","MinutosRetardo"));
    if (!porArea[a]) porArea[a] = {vinieron:0,normal:0,conRetardo:0,extra:0,incompleto:0,minsRetardo:0,lista:[]};
    porArea[a].vinieron++;
    if      (est==="NORMAL")            porArea[a].normal++;
    else if (est==="EXTRA")             porArea[a].extra++;
    else if (est.includes("RETARDO"))   porArea[a].normal++;   // RETARDO = vino aunque tarde
    else                                porArea[a].incompleto++;
    if (ret > 0) { porArea[a].conRetardo++; porArea[a].minsRetardo += ret; }
    porArea[a].lista.push(r);
  });
  const areas = Object.entries(porArea).sort((a,b)=>b[1].vinieron-a[1].vinieron);

  document.getElementById("content").innerHTML = `
    <div class="filters">
      <label style="font-size:11px;color:var(--muted);align-self:center">Desde</label>
      <input type="date" id="a-desde" value="${aDesde}" onchange="renderAreas()">
      <label style="font-size:11px;color:var(--muted);align-self:center">Hasta</label>
      <input type="date" id="a-hasta" value="${aHasta}" onchange="renderAreas()">
      <button class="btn" onclick="document.getElementById('a-desde').value=fechaHoy;document.getElementById('a-hasta').value=fechaHoy;renderAreas()">Hoy</button>
      ${selectSubEmpresa("a-subemp")}
      <div style="font-size:11px;color:var(--muted);display:flex;align-items:center">${dd.length} registros · ${areas.length} áreas · ${aDesde===aHasta?aDesde:aDesde+" → "+aHasta} · Clic en área para ver personal</div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><div class="table-header-title">Asistencia por área — ${aDesde===aHasta?aDesde:aDesde+" → "+aHasta}</div></div>
      <table><thead><tr>
        <th style="width:24px"></th><th>Área</th><th>Asistencia</th><th>Normal</th><th>Con Retardo</th><th>Min. Tarde</th><th>Extra</th><th>Incompleto</th><th>% Asist.</th>
      </tr></thead><tbody id="areas-body">
        ${areas.map(([a,v])=>{
          const id       = a.replace(/[^a-zA-Z0-9]/g,'_');
          const totalEmp = totalPorArea[a] || v.vinieron;
          const pct      = Math.round(v.vinieron / totalEmp * 100);
          const color    = pct >= 90 ? 'var(--accent)' : pct >= 70 ? 'var(--warn)' : 'var(--danger)';
          return `
          <tr style="cursor:pointer" onclick="toggleArea('${a.replace(/'/g,"\\'")}')">
            <td style="color:var(--muted)" id="ic-${id}">▶</td>
            <td style="font-weight:500">${a}</td>
            <td class="mono" style="font-weight:700;color:${color}">${v.vinieron}/${totalEmp}</td>
            <td class="mono green">${v.normal}</td>
            <td class="mono amber">${v.conRetardo > 0 ? v.conRetardo : '—'}</td>
            <td class="mono" style="color:${v.minsRetardo>0?'var(--warn)':'var(--muted)'}">${v.minsRetardo > 0 ? v.minsRetardo+' min' : '—'}</td>
            <td class="mono blue">${v.extra}</td>
            <td class="mono red">${v.incompleto}</td>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <div class="bar-track" style="width:70px"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
                <span class="mono" style="color:${color}">${pct}%</span>
              </div>
            </td>
          </tr>
          <tr id="det-${id}" style="display:none">
            <td colspan="9" style="padding:0;background:var(--bg)">
              <table style="width:100%">
                <thead><tr style="background:var(--bg3)">
                  <th style="padding:7px 12px 7px 28px">Nómina</th><th style="padding:7px 12px">Empleado</th><th style="padding:7px 12px">Turno</th><th style="padding:7px 12px">Entrada</th><th style="padding:7px 12px">Salida</th><th style="padding:7px 12px">Hrs</th><th style="padding:7px 12px">Retardo</th><th style="padding:7px 12px">Estado</th>
                </tr></thead>
                <tbody>
                  ${v.lista.map(r=>`<tr style="border-top:1px solid var(--border)">
                    <td class="mono" style="padding:8px 12px 8px 28px;color:var(--muted)">${g(r,"nomina","NOMINA")}</td>
                    <td style="padding:8px 12px;font-weight:500">${g(r,"nombre","Nombre")} ${g(r,"apellido","Apellido")}</td>
                    <td style="padding:8px 12px;color:var(--muted);font-size:11px">${g(r,"turno","Turno")}</td>
                    <td class="mono" style="padding:8px 12px">${g(r,"entrada_real","EntradaReal")||"—"}</td>
                    <td class="mono" style="padding:8px 12px">${g(r,"salida_real","SalidaFinalReal")||"—"}</td>
                    <td class="mono" style="padding:8px 12px">${calcHoras(r).toFixed(2)}</td>
                    <td class="mono" style="padding:8px 12px;color:${parseRetardo(g(r,"minutos_retardo","MinutosRetardo"))>0?'var(--warn)':'var(--muted)'}">${parseRetardo(g(r,"minutos_retardo","MinutosRetardo"))} min</td>
                    <td style="padding:8px 12px">${estadoBadge(g(r,"estado","EstadoAsistencia"))}</td>
                  </tr>`).join("")}
                </tbody>
              </table>
            </td>
          </tr>`;
        }).join("")}
      </tbody></table>
    </div>`;
}

function toggleArea(area) {
  const id  = area.replace(/[^a-zA-Z0-9]/g,'_');
  const det = document.getElementById(`det-${id}`);
  const ic  = document.getElementById(`ic-${id}`);
  if (!det) return;
  const open = det.style.display !== "none";
  det.style.display = open ? "none" : "table-row";
  ic.textContent = open ? "▶" : "▼";
}

// ─── EMPLEADOS ───────────────────────────────────────────────
function renderEmpleados() {
  const busq = (document.getElementById("e-busq")?.value || "").toLowerCase();
  const fest = document.getElementById("e-area")?.value || "";

  let emps;
  if (datosEmpleados && datosEmpleados.length > 0) {
    // Leer directamente de la pestaña EMPLEADOS
    const muestra = datosEmpleados[0];
    const findKey = (...opts) => {
      for (const o of opts) {
        const found = Object.keys(muestra).find(k => k.toLowerCase() === o.toLowerCase());
        if (found) return found;
      }
      return null;
    };
    const kNom    = findKey("nom","nomina","nómina") || Object.keys(muestra)[0];
    const kNombre = findKey("nombre","name","nombe") || Object.keys(muestra)[1];
    const kArea   = findKey("area","departamento","depto") || "";
    const kPuesto = findKey("puesto","cargo","position") || "";
    const kTurno  = findKey("turno","shift") || "";

    emps = datosEmpleados.filter(r => r[kNom]?.trim()).map(r => {
      const nombreCompleto = (r[kNombre] || "").trim();
      const partes = nombreCompleto.split(" ");
      const apellido = partes.length > 1 ? partes.slice(1).join(" ") : "";
      return {
        nomina:  (r[kNom]   || "").trim(),
        nombre:  partes[0]  || nombreCompleto,
        apellido,
        area:    kArea   ? (r[kArea]   || "").trim() : "",
        puesto:  kPuesto ? (r[kPuesto] || "").trim() : "",
        turno:   kTurno  ? (r[kTurno]  || "").trim() : "",
      };
    });
  } else {
    // Fallback: agrupar desde REGISTROS
    const empMap = {};
    datos.forEach(r => {
      const nom = g(r,"nomina","NOMINA");
      if (!empMap[nom]) empMap[nom] = {
        nomina: nom, nombre: g(r,"nombre","Nombre"), apellido: g(r,"apellido","Apellido"),
        area: g(r,"area","Departamento"), puesto: g(r,"puesto","Puesto"), turno: g(r,"turno","Turno"),
      };
    });
    emps = Object.values(empMap);
  }

  const todas_areas = [...new Set(emps.map(r => r.area).filter(Boolean))].sort();
  if (busq) emps = emps.filter(r => `${r.nombre} ${r.apellido} ${r.nomina}`.toLowerCase().includes(busq));
  if (fest) emps = emps.filter(r => r.area === fest);

  document.getElementById("content").innerHTML = `
    <div class="filters">
      <input type="text" id="e-busq" placeholder="Buscar por nombre o nómina..." value="${busq}" oninput="renderEmpleados()">
      <select class="filter" id="e-area" onchange="renderEmpleados()">
        <option value="">Todas las áreas</option>
        ${todas_areas.map(a=>`<option value="${a}" ${fest===a?'selected':''}>${a}</option>`).join("")}
      </select>
    </div>
    <div class="table-wrap">
      <div class="table-header"><div class="table-header-title">Empleados</div><div style="font-size:11px;color:var(--muted)">${emps.length} empleados</div></div>
      <table><thead><tr>
        <th>Nómina</th><th>Nombre</th><th>Apellido</th><th>Área</th><th>Puesto</th><th>Turno</th>
      </tr></thead><tbody>
        ${emps.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">Sin resultados</td></tr>`:
        emps.map(r=>`<tr>
          <td class="mono" style="color:var(--muted)">${r.nomina}</td>
          <td style="font-weight:500">${r.nombre}</td>
          <td>${r.apellido}</td>
          <td style="font-size:11px;color:var(--muted)">${r.area}</td>
          <td style="font-size:11px;color:var(--muted)">${r.puesto}</td>
          <td style="font-size:11px;color:var(--muted)">${r.turno}</td>
        </tr>`).join("")}
      </tbody></table>
    </div>`;
}

async function guardarEmpleado(e) {
  e.preventDefault();
  const emp = EMPRESAS[empresaActual];
  const msg = document.getElementById("alta-msg");
  const btn = document.getElementById("alta-btn");

  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="width:13px;height:13px;margin-right:6px;flex-shrink:0"></div>Guardando...`;
  msg.style.display = "none";

  const payload = {
    sheets_id:   emp.sheets_id,
    empresa:     emp.nombre,
    nomina:      document.getElementById("f-nomina").value.trim(),
    nombre:      document.getElementById("f-nombre").value.trim(),
    apellido:    document.getElementById("f-apellido").value.trim(),
    area:        document.getElementById("f-area").value,
    puesto:      document.getElementById("f-puesto").value.trim(),
    turno:       document.getElementById("f-turno").value,
    mano_obra:   document.getElementById("f-mano").value,
    tipo_nomina: document.getElementById("f-tipo").value,
    sexo:        document.getElementById("f-sexo").value
  };

  try {
    const resp   = await fetch(APPS_SCRIPT_URL, { method:"POST", body:JSON.stringify(payload) });
    const result = await resp.json();
    msg.style.display = "block";
    if (result.ok) {
      msg.innerHTML = `<div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:12px;color:#4ade80;font-size:13px">✓ ${result.msg}</div>`;
      e.target.reset();
      datosEmpleados = null;
    } else {
      msg.innerHTML = `<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:12px;color:#f87171;font-size:13px">✗ ${result.error}</div>`;
    }
  } catch(err) {
    msg.style.display = "block";
    msg.innerHTML = `<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:12px;color:#f87171;font-size:13px">✗ Error de conexión: ${err.message}</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v14a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar en Sheets`;
}

// ─── SEMANA DE NÓMINA: Jueves → Miércoles ────────────────────
function getSemanaNomina(offset) {
  const hoy = new Date();
  const dow = hoy.getDay(); // 0=Dom,1=Lun,2=Mar,3=Mié,4=Jue,5=Vie,6=Sáb
  // Días transcurridos desde el último jueves
  // Jue=0, Vie=1, Sáb=2, Dom=3, Lun=4, Mar=5, Mié=6
  const diasDesdeJueves = (dow + 3) % 7;
  const jueves = new Date(hoy);
  jueves.setDate(hoy.getDate() - diasDesdeJueves + (offset || 0) * 7);
  jueves.setHours(0,0,0,0);
  const miercoles = new Date(jueves);
  miercoles.setDate(jueves.getDate() + 6);
  const toISO = d => d.toISOString().split("T")[0];
  return {
    desde: toISO(jueves),
    hasta: toISO(miercoles),
    dias:  Array.from({length:7}, (_,i) => { const d = new Date(jueves); d.setDate(jueves.getDate()+i); return toISO(d); })
  };
}

// ─── SEMANA (GRID) ────────────────────────────────────────────
let semanaOffset = 0;
function renderSemana() {
  const sem = getSemanaNomina(semanaOffset);
  const diasNombres = ["Jue","Vie","Sáb","Dom","Lun","Mar","Mié"];
  const filtrarArea = document.getElementById("sg-area")?.value || "";

  // Mapa: nomina_fecha -> registro
  const lookup = {};
  datos.forEach(r => {
    const nom = g(r,"nomina","NOMINA");
    const fecha = g(r,"fecha","Fecha");
    if (nom && fecha) lookup[`${nom}_${fecha}`] = r;
  });

  // Lista de empleados de la semana
  const empMap = {};
  datos.filter(r => { const f = g(r,"fecha","Fecha"); return f >= sem.desde && f <= sem.hasta; })
    .forEach(r => {
      const nom = g(r,"nomina","NOMINA");
      if (!nom || empMap[nom]) return;
      empMap[nom] = { nomina: nom, nombre: `${g(r,"nombre","Nombre")} ${g(r,"apellido","Apellido")}`.trim(), area: g(r,"area","Departamento") };
    });
  let emps = Object.values(empMap).sort((a,b) => a.nombre.localeCompare(b.nombre));

  const areasSet = new Set(emps.map(e => e.area).filter(Boolean));
  if (filtrarArea) emps = emps.filter(e => e.area === filtrarArea);

  const colorCell = r => {
    if (!r) return `<td style="text-align:center;color:rgba(255,255,255,0.1);border-left:1px solid var(--border)">—</td>`;
    const est = g(r,"estado","EstadoAsistencia");

      "NORMAL":            ["#16a34a", "#ffffff"],
      "EXTRA":             ["#2563eb", "#ffffff"],
      "RETARDO":           ["#d97706", "#ffffff"],
      "RETARDO CON EXTRA": ["#7c3aed", "#ffffff"],
      "INCOMPLETO":        ["#dc2626", "#ffffff"],
      "AUSENTE":           ["#991b1b", "#fca5a5"]
    };
    const [bg, col] = colores[est] || ["","var(--muted)"];
    const label = ht > 0 ? `${ht.toFixed(1)}h` : (est === "INCOMPLETO" ? "INC" : est === "AUSENTE" ? "AUS" : "—");
    const bgStyle = bg ? `background-color:${bg} !important;` : "";
    return `<td title="${est||'sin registro'}" style="${bgStyle}color:${col};text-align:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;border-left:1px solid rgba(0,0,0,0.2)">${label}</td>`;
  };

  document.getElementById("content").innerHTML = `
    <div class="filters" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn" onclick="semanaOffset--;renderSemana()">← Anterior</button>
        <span style="font-size:13px;font-weight:500">${sem.desde} → ${sem.hasta}</span>
        <button class="btn" onclick="semanaOffset++;renderSemana()" ${semanaOffset>=0?"disabled":""}>Siguiente →</button>
        <button class="btn" onclick="semanaOffset=0;renderSemana()">Semana actual</button>
      </div>
      <div style="display:flex;gap:8px">
        ${selectSubEmpresa("sg-subemp")}
        <select class="filter" id="sg-area" onchange="renderSemana()">
          <option value="">Todas las áreas</option>
          ${[...areasSet].sort().map(a=>`<option value="${a}" ${filtrarArea===a?"selected":""}>${a}</option>`).join("")}
        </select>
      </div>
    </div>
    <div class="table-wrap" style="overflow-x:auto">
      <div class="table-header">
        <div class="table-header-title">Semana Jue ${sem.desde} → Mié ${sem.hasta}</div>
        <div style="font-size:11px;color:var(--muted)">${emps.length} empleados · hora de entrada real</div>
      </div>
      <table style="min-width:700px"><thead><tr>
        <th>Nómina</th><th>Empleado</th><th>Área</th>
        ${diasNombres.map((n,i)=>`<th style="text-align:center;border-left:1px solid var(--border)">${n}<br><span style="font-weight:400;font-size:9px;opacity:.7">${sem.dias[i].slice(5)}</span></th>`).join("")}
        <th style="text-align:center;border-left:1px solid var(--border)">Días</th>
      </tr></thead><tbody>
        ${emps.length===0
          ? `<tr><td colspan="11" style="text-align:center;color:var(--muted);padding:32px">Sin registros esta semana</td></tr>`
          : emps.map(e => {
              const regs = sem.dias.map(d => lookup[`${e.nomina}_${d}`] || null);
              const dias = regs.filter(r => r && !["AUSENTE","INCOMPLETO"].includes(g(r,"estado","EstadoAsistencia"))).length;
              return `<tr>
                <td class="mono" style="color:var(--muted)">${e.nomina}</td>
                <td style="font-weight:500;white-space:nowrap">${e.nombre}</td>
                <td style="font-size:11px;color:var(--muted);white-space:nowrap">${e.area}</td>
                ${regs.map(r => colorCell(r)).join("")}
                <td style="text-align:center;font-family:'DM Mono',monospace;font-weight:600;border-left:1px solid var(--border);color:${dias>=5?'var(--accent)':dias>=3?'var(--warn)':'var(--danger)'}">${dias}/7</td>
              </tr>`;
            }).join("")}
      </tbody></table>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap">
      ${[["NORMAL","#4ade80"],["EXTRA","#60a5fa"],["RETARDO","#fbbf24"],["RETARDO CON EXTRA","#a78bfa"],["INCOMPLETO","#f87171"],["AUSENTE","#ef4444"]]

}

// ─── NÓMINA ───────────────────────────────────────────────────
let nominaOffset = 0;
let nominaExportData = [];

function renderNomina() {
  const sem = getSemanaNomina(nominaOffset);
  const filtrarArea  = document.getElementById("n-area")?.value  || "";
  const filtrarEmp   = (document.getElementById("n-busq")?.value || "").toLowerCase();
  const diasNombres  = { 0:"Dom", 1:"Lun", 2:"Mar", 3:"Mié", 4:"Jue", 5:"Vie", 6:"Sáb" };

  // Todos los registros de la semana
  let dd = datos.filter(r => { const f = g(r,"fecha","Fecha"); return f >= sem.desde && f <= sem.hasta; });
  if (filtrarArea) dd = dd.filter(r => g(r,"area","Departamento") === filtrarArea);
  if (filtrarEmp)  dd = dd.filter(r => `${g(r,"nombre","Nombre")} ${g(r,"apellido","Apellido")} ${g(r,"nomina","NOMINA")}`.toLowerCase().includes(filtrarEmp));

  // Ordenar: área → nombre → fecha
  dd.sort((a,b) => {
    const ka = `${g(a,"area","Departamento")}${g(a,"nombre","Nombre")}${g(a,"apellido","Apellido")}${g(a,"fecha","Fecha")}`;
    const kb = `${g(b,"area","Departamento")}${g(b,"nombre","Nombre")}${g(b,"apellido","Apellido")}${g(b,"fecha","Fecha")}`;
    return ka.localeCompare(kb);
  });

  // Totales
  const areasSet    = new Set(datos.filter(r=>{ const f=g(r,"fecha","Fecha"); return f>=sem.desde&&f<=sem.hasta; }).map(r=>g(r,"area","Departamento")).filter(Boolean));
  const totHoras    = dd.reduce((s,r)=>s+calcHoras(r),0);
  const totExtra    = dd.reduce((s,r)=>s+parseHoras(g(r,"horas_extra","HorasExtra")),0);
  const totRetardos = dd.filter(r=>g(r,"estado","EstadoAsistencia")?.includes("RETARDO")).length;

  // Para agrupar visualmente: detectar cambio de empleado
  let ultimoEmp = null;
  const filasTotales = {}; // nomina -> acumulados para fila total
  dd.forEach(r => {
    const nom = g(r,"nomina","NOMINA");
    if (!filasTotales[nom]) filasTotales[nom] = { dias:0, hrs:0, extra:0, retardo:0 };
    const est = g(r,"estado","EstadoAsistencia");
    if (est && est !== "AUSENTE" && est !== "INCOMPLETO") filasTotales[nom].dias++;
    filasTotales[nom].hrs     += calcHoras(r);
    filasTotales[nom].extra   += parseHoras(g(r,"horas_extra","HorasExtra"));
    filasTotales[nom].retardo += parseRetardo(g(r,"minutos_retardo","MinutosRetardo"));
  });

  // Guardar para CSV
  nominaExportData = dd;

  const filaHTML = (r, esPrimera, esUltima, tot) => {
    const nom    = g(r,"nomina","NOMINA");
    const nombre = `${g(r,"nombre","Nombre")} ${g(r,"apellido","Apellido")}`.trim();
    const fecha  = g(r,"fecha","Fecha");
    const dow    = fecha ? diasNombres[new Date(fecha+"T12:00:00").getDay()] : "";
    const est    = g(r,"estado","EstadoAsistencia");
    const ent    = g(r,"entrada_real","EntradaReal")   || "—";
    const sal    = g(r,"salida_real","SalidaFinalReal") || "—";
    const ic     = g(r,"inicio_comer")                  || "—";
    const rc     = g(r,"regreso_comer")                 || "—";
    const ht     = calcHoras(r);
    const he     = parseHoras(g(r,"horas_extra","HorasExtra"));
    const ret    = parseRetardo(g(r,"minutos_retardo","MinutosRetardo"));

    const colorEst = { "NORMAL":"var(--accent)","EXTRA":"var(--accent2)","RETARDO":"var(--warn)","RETARDO CON EXTRA":"#a78bfa","INCOMPLETO":"var(--danger)","AUSENTE":"var(--danger)" };
    const bdr = esPrimera ? "border-top:2px solid rgba(255,255,255,0.1)" : "";

    let html = `<tr style="${bdr}">`;
    if (esPrimera) {
      html += `<td class="mono" style="color:var(--muted);vertical-align:top" rowspan="${tot.filas}">${nom}</td>
               <td style="font-weight:600;vertical-align:top;white-space:nowrap" rowspan="${tot.filas}">${nombre}</td>
               <td style="font-size:11px;color:var(--muted);vertical-align:top;white-space:nowrap" rowspan="${tot.filas}">${g(r,"area","Departamento")}</td>
               <td style="font-size:11px;color:var(--muted);vertical-align:top;white-space:nowrap" rowspan="${tot.filas}">${g(r,"turno","Turno")}</td>`;
    }
    html += `
      <td class="mono" style="color:var(--muted);white-space:nowrap">${fecha}</td>
      <td style="color:var(--muted);font-size:11px;white-space:nowrap">${dow}</td>
      <td class="mono" style="color:${ent!=="—"?'var(--text)':'var(--muted)'}">${ent}</td>
      <td class="mono" style="color:${sal!=="—"?'var(--text)':'var(--muted)'}">${sal}</td>
      <td class="mono" style="color:${ic!=="—"?'var(--muted)':'var(--bg3)'}">${ic}</td>
      <td class="mono" style="color:${rc!=="—"?'var(--muted)':'var(--bg3)'}">${rc}</td>
      <td class="mono" style="text-align:right;font-weight:500;color:${ht>0?'var(--text)':'var(--muted)'}">${ht>0?ht.toFixed(2):"—"}</td>
      <td class="mono" style="text-align:right;color:${he>0?'var(--accent2)':'var(--muted)'}">${he>0?he.toFixed(2):"—"}</td>
      <td class="mono" style="color:${ret>0?'var(--warn)':'var(--muted)'}">${ret>0?ret+" min":"—"}</td>
      <td><span style="font-size:10px;padding:2px 6px;border-radius:4px;background:${colorEst[est]||'var(--bg3)'}22;color:${colorEst[est]||'var(--muted)'}">${est||"—"}</span></td>`;
    html += `</tr>`;

    // Fila de total por empleado al final del grupo
    if (esUltima) {
      const retSem     = tot.retardo;                        // suma bruta
      const retDescon  = Math.max(0, retSem - 10);          // tolerancia 10 min/semana
      const retColor   = retDescon > 0 ? 'var(--warn)' : 'var(--accent)';
      html += `<tr style="background:rgba(255,255,255,0.02)">
        <td colspan="2" style="font-size:11px;color:var(--muted);text-align:right;padding:6px 12px;border-top:1px solid var(--border)">Total semana:</td>
        <td colspan="2"></td>
        <td class="mono" style="font-weight:600;text-align:right;border-top:1px solid var(--border)">${tot.hrs.toFixed(2)}</td>
        <td class="mono" style="text-align:right;color:var(--accent2);border-top:1px solid var(--border)">${tot.extra>0?tot.extra.toFixed(2):"—"}</td>
        <td class="mono" style="border-top:1px solid var(--border);color:${retColor}" title="Suma bruta: ${retSem} min — tolerancia 10 min/semana">${retSem>0?retSem+' min brutos<br><span style="font-size:10px">-10 tol = '+retDescon+' min</span>':"—"}</td>
        <td style="border-top:1px solid var(--border)"></td>
      </tr>`;
    }
    return html;
  };

  // Agrupar filas por empleado
  let filasHTML = "";
  let i = 0;
  while (i < dd.length) {
    const nom = g(dd[i],"nomina","NOMINA");
    let j = i;
    while (j < dd.length && g(dd[j],"nomina","NOMINA") === nom) j++;
    const grupo = dd.slice(i, j);
    const tot   = { filas: grupo.length + 1, ...filasTotales[nom] };
    grupo.forEach((r, idx) => {
      filasHTML += filaHTML(r, idx===0, idx===grupo.length-1, tot);
    });
    i = j;
  }

  document.getElementById("content").innerHTML = `
    <div class="filters" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn" onclick="nominaOffset--;renderNomina()">← Anterior</button>
        <span style="font-size:13px;font-weight:500">Semana: ${sem.desde} → ${sem.hasta}</span>
        <button class="btn" onclick="nominaOffset++;renderNomina()" ${nominaOffset>=0?"disabled":""}>Siguiente →</button>
        <button class="btn" onclick="nominaOffset=0;renderNomina()">Semana actual</button>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input type="text" id="n-busq" placeholder="Buscar empleado..." value="${filtrarEmp}" oninput="renderNomina()" style="min-width:160px">
        ${selectSubEmpresa("n-subemp")}
        <select class="filter" id="n-area" onchange="renderNomina()">
          <option value="">Todas las áreas</option>
          ${[...areasSet].sort().map(a=>`<option value="${a}" ${filtrarArea===a?"selected":""}>${a}</option>`).join("")}
        </select>
        <button class="btn" onclick="exportarNominaCSV()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar CSV
        </button>
      </div>
    </div>
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px">
      <div class="metric"><div class="metric-label">Total horas trabajadas</div><div class="metric-val blue">${totHoras.toFixed(1)}</div><div class="metric-sub">${dd.length} registros · ${sem.desde} → ${sem.hasta}</div></div>
      <div class="metric"><div class="metric-label">Total horas extra</div><div class="metric-val amber">${totExtra.toFixed(1)}</div><div class="metric-sub">en la semana</div></div>
      <div class="metric"><div class="metric-label">Retardos</div><div class="metric-val red">${totRetardos}</div><div class="metric-sub">llegadas tarde</div></div>
    </div>
    <div class="table-wrap" style="overflow-x:auto">
      <div class="table-header">
        <div class="table-header-title">Detalle nómina — ${sem.desde} → ${sem.hasta}</div>
        <div style="font-size:11px;color:var(--muted)">${Object.keys(filasTotales).length} empleados · ${dd.length} registros</div>
      </div>
      <table style="min-width:900px"><thead><tr>
        <th>Nómina</th><th>Nombre</th><th>Área</th><th>Turno</th>
        <th>Fecha</th><th>Día</th>
        <th>Entrada</th><th>Salida</th>
        <th>I. Comida</th><th>R. Comida</th>
        <th style="text-align:right">Hrs. trab.</th>
        <th style="text-align:right">Hrs. extra</th>
        <th>Retardo</th><th>Estado</th>
      </tr></thead><tbody>
        ${dd.length===0
          ? `<tr><td colspan="14" style="text-align:center;color:var(--muted);padding:32px">Sin registros esta semana</td></tr>`
          : filasHTML}
      </tbody></table>
    </div>`;
}

function exportarNominaCSV() {
  const sem = getSemanaNomina(nominaOffset);
  const diasNombres = { 0:"Dom",1:"Lun",2:"Mar",3:"Mié",4:"Jue",5:"Vie",6:"Sáb" };
  const filas = [
    ["Nomina","Nombre","Area","Turno","Fecha","Dia","Entrada","Salida","Inicio Comida","Regreso Comida","Hrs Trabajadas","Hrs Extra","Min Retardo","Estado"],
    ...nominaExportData.map(r => {
      const fecha = g(r,"fecha","Fecha");
      const dow   = fecha ? diasNombres[new Date(fecha+"T12:00:00").getDay()] : "";
      const ht    = calcHoras(r);
      const he    = parseHoras(g(r,"horas_extra","HorasExtra"));
      const ret   = parseRetardo(g(r,"minutos_retardo","MinutosRetardo"));
      return [
        g(r,"nomina","NOMINA"),
        `${g(r,"nombre","Nombre")} ${g(r,"apellido","Apellido")}`.trim(),
        g(r,"area","Departamento"),
        g(r,"turno","Turno"),
        fecha, dow,
        g(r,"entrada_real","EntradaReal"),
        g(r,"salida_real","SalidaFinalReal"),
        g(r,"inicio_comer") || "",
        g(r,"regreso_comer") || "",
        ht>0 ? ht.toFixed(2) : "",
        he>0 ? he.toFixed(2) : "",
        ret>0 ? ret : "",
        g(r,"estado","EstadoAsistencia")
      ];
    })
  ];
  const csv  = filas.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8"});
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = `nomina_${sem.desde}_${sem.hasta}.csv`;
  a.click();
}

cargarDatos();
</script>
</body>
</html>
